services:
  - type: web
    name: cartazista-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false           # defina no painel do Render
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: CORS_ORIGINS
        value: "*"            # em produção, troque pelo domínio Vercel
      - key: PYTHON_VERSION
        value: "3.11.9"
