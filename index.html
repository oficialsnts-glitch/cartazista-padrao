<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartazista Pro 18.6 - Double Click Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Anton&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #0984e3; --danger: #d63031; --sucesso: #00b894; --dark: #1e272e; --warning: #f1c40f; }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        body { font-family: 'Segoe UI', sans-serif; background: #4b6584; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .toolbar { background: var(--dark); padding: 10px 20px; display: flex; gap: 10px; align-items: center; color: white; z-index: 2000; }
        .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: 900; font-size: 10px; text-transform: uppercase; }
        .btn-add { background: var(--sucesso); color: white; }
        .btn-duplica { background: var(--azul); color: white; }
        .btn-print { background: var(--danger); color: white; }
        .btn-fechar { background: #d63031; color: white; width: 100%; margin-bottom: 10px; font-size: 11px; }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        .workspace { flex: 1; overflow: auto; padding: 40px; background: #2f3542; display: flex; justify-content: center; }
        
        #folha-impressao { width: 210mm; min-height: 297mm; background: white; display: grid; position: relative; }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr; grid-template-rows: 148.5mm 148.5mm; }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 148.5mm 148.5mm; }

        .cartaz-area { position: relative; overflow: hidden; background: #fff; border: 0.1mm dashed #ddd; }
        .item-movel { position: absolute; cursor: move; user-select: none; line-height: 0.95; z-index: 10; white-space: pre-wrap; text-align: center; }
        .tarja-fundo { z-index: 5; border: none; }
        .selecionado { outline: 3px solid var(--azul) !important; z-index: 999 !important; background: rgba(9, 132, 227, 0.05); }

        .editor-panel { width: 420px; background: #f1f2f6; padding: 15px; border-left: 1px solid #ccc; display: none; flex-direction: column; gap: 10px; overflow-y: auto; }
        .secao { background: #fff; border: 1px solid #ddd; padding: 12px; border-radius: 6px; }
        .campo { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
        label { font-size: 9px; font-weight: 800; color: #57606f; text-transform: uppercase; }
        textarea { padding: 6px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 12px; resize: none; font-family: inherit; }
        input[type="number"], select { padding: 6px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 12px; }

        .color-palette { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-bottom: 10px; }
        .color-box { width: 100%; height: 25px; border: 1px solid #ddd; border-radius: 3px; cursor: pointer; transition: 0.1s; }
        .color-box:hover { transform: scale(1.1); border-color: #000; }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white !important; overflow: visible !important; }
            .toolbar, .editor-panel { display: none !important; }
            .main-container, .workspace { padding: 0 !important; background: white !important; overflow: visible !important; }
            #folha-impressao { box-shadow: none !important; border: none !important; margin: 0 !important; }
            .selecionado { outline: none !important; background: none !important; }
            .cartaz-area { border: none !important; }
        }
    </style>
</head>
<body onmouseup="pararArrasto()">

<div class="toolbar">
    <div style="font-weight: 900;">CARTAZISTA <span style="color:var(--warning)">PRO 18.6</span></div>
    <select onchange="mudarLayout(this.value)" style="padding:5px;">
        <option value="grid-4">4 POR FOLHA</option>
        <option value="grid-2">2 POR FOLHA</option>
        <option value="grid-1">1 POR FOLHA (A4)</option>
    </select>
    <button class="btn btn-add" onclick="adicionarCartaz()">✚ NOVO</button>
    <button class="btn btn-duplica" onclick="duplicarCartaz()">📋 DUPLICAR</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ IMPRIMIR</button>
</div>

<div class="main-container">
    <div class="workspace">
        <div id="folha-impressao" class="grid-4"></div>
    </div>

    <div class="editor-panel" id="edPanel" onmouseenter="pararArrasto()">
        <button class="btn btn-fechar" onclick="desmarcarTudo()">✖ CONCLUIR E LIMPAR SELEÇÃO</button>
        
        <div class="secao">
            <h4>CONTEÚDO</h4>
            <div class="campo"><label>Chamada</label><textarea id="inHead" onfocus="focarItem('head')" oninput="atualizarTextos('head')"></textarea></div>
            <div class="campo"><label>Produto</label><textarea id="inDesc" onfocus="focarItem('desc')" oninput="atualizarTextos('desc')"></textarea></div>
            <div class="campo"><label>Marca</label><textarea id="inMarca" onfocus="focarItem('marca')" oninput="atualizarTextos('marca')"></textarea></div>
            <div class="campo"><label>Peso</label><textarea id="inPeso" onfocus="focarItem('peso')" oninput="atualizarTextos('peso')"></textarea></div>
            <div class="campo"><label>Preço</label><textarea id="inPreco" onfocus="focarItem('preco')" oninput="atualizarTextos('preco')"></textarea></div>
        </div>

        <div class="secao" style="background:#eef2f7">
            <h4 id="labelEdit" style="font-size:11px; color:var(--azul)">ESTILO E CORES</h4>
            
            <label>Cores Rápidas</label>
            <div class="color-palette">
                <div class="color-box" style="background: #000000" onclick="setCorRapida('#000000')"></div>
                <div class="color-box" style="background: #ffffff" onclick="setCorRapida('#ffffff')"></div>
                <div class="color-box" style="background: #d63031" onclick="setCorRapida('#d63031')"></div>
                <div class="color-box" style="background: #f1c40f" onclick="setCorRapida('#f1c40f')"></div>
                <div class="color-box" style="background: #0984e3" onclick="setCorRapida('#0984e3')"></div>
                <div class="color-box" style="background: #00b894" onclick="setCorRapida('#00b894')"></div>
                <div class="color-box" style="background: #e67e22" onclick="setCorRapida('#e67e22')"></div>
                <div class="color-box" style="background: #8e44ad" onclick="setCorRapida('#8e44ad')"></div>
                <div class="color-box" style="background: #2d3436" onclick="setCorRapida('#2d3436')"></div>
                <div class="color-box" style="background: #ffeaa7" onclick="setCorRapida('#ffeaa7')"></div>
                <div class="color-box" style="background: #ff7675" onclick="setCorRapida('#ff7675')"></div>
                <div class="color-box" style="background: #74b9ff" onclick="setCorRapida('#74b9ff')"></div>
            </div>

            <div class="campo"><label>Fonte</label>
                <select id="inFont" onchange="atualizarEstilo()">
                    <option value="'Bebas Neue'">Bebas Neue</option>
                    <option value="'Anton'">Anton</option>
                    <option value="'Archivo Black'">Archivo Black</option>
                    <option value="'Oswald'">Oswald</option>
                </select>
            </div>
            <div style="display:flex; gap:10px">
                <div class="campo" style="flex:1"><label>Tamanho</label><input type="range" id="inSize" min="5" max="800" oninput="atualizarEstilo()"></div>
                <div class="campo"><label>Cor Personalizada</label><input type="color" id="inColor" onchange="atualizarEstilo()"></div>
            </div>
            <div id="controlesFundo" style="display:none; border-top:1px solid #ccc; padding-top:10px; margin-top:10px">
                <div style="display:flex; gap:10px">
                    <div class="campo"><label>Largura</label><input type="number" id="inW" oninput="atualizarEstilo()"></div>
                    <div class="campo"><label>Altura</label><input type="number" id="inH" oninput="atualizarEstilo()"></div>
                </div>
            </div>
            <button class="btn" onclick="centralizar()" style="background:var(--azul); color:white; width:100%; margin-top:5px">↔ CENTRALIZAR MANUALMENTE</button>
        </div>
        <button class="btn" onclick="adicionarTarja()" style="background:#ffa502; color:white">⬛ ADICIONAR TARJA</button>
        <button class="btn" onclick="removerCartaz()" style="background:none; border:1px solid red; color:red; margin-top:10px">EXCLUIR CARTAZ</button>
    </div>
</div>

<script>
    let cartazes = [];
    let sel = null;
    let dragging = false;
    let offset = { x: 0, y: 0 };

    function adicionarCartaz() {
        const id = Date.now();
        cartazes.push({
            id: id,
            itens: [
                { id: 'h-'+id, tipo: 'head', val: 'OFERTA', x: 100, y: 15, size: 35, font: "'Bebas Neue'", col: '#d63031', w:0, h:0 },
                { id: 'd-'+id, tipo: 'desc', val: 'PRODUTO', x: 80, y: 60, size: 50, font: "'Bebas Neue'", col: '#000', w:0, h:0 },
                { id: 'm-'+id, tipo: 'marca', val: 'MARCA', x: 120, y: 120, size: 25, font: "'Bebas Neue'", col: '#000', w:0, h:0 },
                { id: 'w-'+id, tipo: 'peso', val: 'UNID', x: 150, y: 150, size: 20, font: "'Bebas Neue'", col: '#d63031', w:0, h:0 },
                { id: 'p-'+id, tipo: 'preco', val: '0,99', x: 50, y: 180, size: 150, font: "'Anton'", col: '#000', w:0, h:0 }
            ]
        });
        render();
        const ultimo = cartazes[cartazes.length - 1];
        setTimeout(() => {
            ultimo.itens.forEach(it => {
                const el = document.getElementById(it.id);
                if(el && it.tipo !== 'bg') {
                    it.x = (el.parentElement.offsetWidth / 2) - (el.offsetWidth / 2);
                    el.style.left = it.x + 'px';
                }
            });
        }, 50);
    }

    function desmarcarTudo() {
        sel = null;
        document.querySelectorAll('.item-movel').forEach(i => i.classList.remove('selecionado'));
        document.getElementById('edPanel').style.display = 'none';
    }

    function setCorRapida(cor) {
        if(!sel) return;
        document.getElementById('inColor').value = cor;
        atualizarEstilo();
    }

    function duplicarCartaz() {
        if(!sel) return alert("Selecione um cartaz primeiro.");
        const clone = JSON.parse(JSON.stringify(sel.cartaz));
        clone.id = Date.now();
        clone.itens.forEach(it => it.id = it.id.split('-')[0] + '-' + clone.id);
        cartazes.push(clone);
        render();
    }

    function focarItem(tipo) {
        if(!sel) return;
        const item = sel.cartaz.itens.find(i => i.tipo === tipo);
        if(item) {
            sel.data = item;
            sel.el = document.getElementById(item.id);
            document.querySelectorAll('.item-movel').forEach(i => i.classList.remove('selecionado'));
            sel.el.classList.add('selecionado');
            mostrarNoPainel(item, sel.cartaz);
        }
    }

    function render() {
        const folha = document.getElementById('folha-impressao');
        folha.innerHTML = '';
        cartazes.forEach(c => {
            const area = document.createElement('div');
            area.className = 'cartaz-area';
            c.itens.forEach(it => {
                const el = document.createElement('div');
                el.id = it.id;
                el.className = 'item-movel' + (it.tipo === 'bg' ? ' tarja-fundo' : '');
                el.style.left = it.x + 'px'; el.style.top = it.y + 'px';
                el.style.color = it.col;
                if(it.tipo === 'bg') {
                    el.style.backgroundColor = it.col; el.style.width = it.w + 'px'; el.style.height = it.h + 'px';
                } else {
                    el.style.fontSize = it.size + 'px'; el.style.fontFamily = it.font;
                    if(it.tipo === 'preco') {
                        const p = it.val.replace(',', '.').split('.');
                        el.innerHTML = `<small style="font-size:0.35em">R$</small>${p[0]}<small style="font-size:0.5em; border-bottom:6px solid">,${p[1]||'00'}</small>`;
                    } else { el.innerText = it.val; }
                }

                // FUNÇÃO DE CLIQUE DUPLO PARA EDIÇÃO RÁPIDA
                el.ondblclick = (e) => {
                    if(it.tipo === 'bg') return;
                    const novoTexto = prompt("DIGITE O NOVO TEXTO:", it.val);
                    if(novoTexto !== null) {
                        it.val = novoTexto.toUpperCase(); // CAIXA ALTA AUTOMÁTICA
                        render();
                        // Re-seleciona para não perder o foco
                        setTimeout(() => {
                            const reSel = document.getElementById(it.id);
                            if(reSel) reSel.classList.add('selecionado');
                            mostrarNoPainel(it, c);
                        }, 50);
                    }
                };

                el.onmousedown = (e) => {
                    e.stopPropagation();
                    sel = { data: it, el: el, cartaz: c };
                    dragging = true;
                    document.querySelectorAll('.item-movel').forEach(i => i.classList.remove('selecionado'));
                    el.classList.add('selecionado');
                    offset.x = e.clientX - el.offsetLeft; offset.y = e.clientY - el.offsetTop;
                    mostrarNoPainel(it, c);
                };
                area.appendChild(el);
            });
            folha.appendChild(area);
        });
    }

    function mostrarNoPainel(it, c) {
        document.getElementById('edPanel').style.display = 'flex';
        document.getElementById('inHead').value = c.itens.find(i => i.tipo === 'head').val;
        document.getElementById('inDesc').value = c.itens.find(i => i.tipo === 'desc').val;
        document.getElementById('inMarca').value = c.itens.find(i => i.tipo === 'marca').val;
        document.getElementById('inPeso').value = c.itens.find(i => i.tipo === 'peso').val;
        document.getElementById('inPreco').value = c.itens.find(i => i.tipo === 'preco').val;
        document.getElementById('inFont').value = it.font;
        document.getElementById('inSize').value = it.size;
        document.getElementById('inColor').value = it.col;
        document.getElementById('inW').value = it.w;
        document.getElementById('inH').value = it.h;
        document.getElementById('controlesFundo').style.display = it.tipo === 'bg' ? 'block' : 'none';
        document.getElementById('labelEdit').innerText = "EDITANDO: " + it.tipo.toUpperCase();
    }

    function atualizarTextos(tipo) {
        if(!sel) return;
        const alvo = sel.cartaz.itens.find(i => i.tipo === tipo);
        alvo.val = document.getElementById('in' + tipo.charAt(0).toUpperCase() + tipo.slice(1)).value;
        render();
        const el = document.getElementById(sel.data.id);
        if(el) el.classList.add('selecionado');
    }

    function atualizarEstilo() {
        if(!sel) return;
        sel.data.font = document.getElementById('inFont').value;
        sel.data.size = document.getElementById('inSize').value;
        sel.data.col = document.getElementById('inColor').value;
        sel.data.w = document.getElementById('inW').value;
        sel.data.h = document.getElementById('inH').value;
        render();
        const el = document.getElementById(sel.data.id);
        if(el) el.classList.add('selecionado');
    }

    function pararArrasto() { dragging = false; }

    function centralizar() {
        if(!sel) return;
        sel.data.x = (sel.el.parentElement.offsetWidth / 2) - (sel.el.offsetWidth / 2);
        render();
        const el = document.getElementById(sel.data.id);
        if(el) el.classList.add('selecionado');
    }

    function adicionarTarja() {
        if(!sel) return;
        const id = 'bg-' + Date.now();
        sel.cartaz.itens.unshift({ id: id, tipo: 'bg', val: '', x: 10, y: 10, size: 0, font: '', col: '#d63031', w: 300, h: 60 });
        render();
    }

    function mudarLayout(v) { document.getElementById('folha-impressao').className = v; }
    function removerCartaz() { if(sel) { cartazes = cartazes.filter(c => c.id !== sel.cartaz.id); sel = null; document.getElementById('edPanel').style.display='none'; render(); } }

    document.onmousemove = (e) => {
        if(!dragging || !sel) return;
        sel.data.x = e.clientX - offset.x;
        sel.data.y = e.clientY - offset.y;
        sel.el.style.left = sel.data.x + 'px';
        sel.el.style.top = sel.data.y + 'px';
    };

    adicionarCartaz();
</script>
</body>
</html>
