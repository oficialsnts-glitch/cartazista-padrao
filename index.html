<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartazista Pro 11.0 - Campos Separados</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Anton&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #0984e3; --danger: #d63031; --sucesso: #00b894; --cinza: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; background: #cbd5e0; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* TOOLBAR */
        .toolbar { background: var(--cinza); padding: 10px 20px; display: flex; gap: 15px; align-items: center; color: white; z-index: 2000; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--sucesso); color: white; }
        .btn-print { background: var(--danger); color: white; }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        .workspace { flex: 1; overflow: auto; padding: 40px; background: #555; display: flex; justify-content: center; }
        
        #folha-impressao { width: 210mm; background: white; display: grid; min-height: 297mm; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 148.5mm 148.5mm; }

        .cartaz-area { border: 0.2mm dashed #ccc; position: relative; overflow: hidden; background: #fff; }
        
        /* ELEMENTOS */
        .item-movel { position: absolute; cursor: move; user-select: none; line-height: 0.9; padding: 5px; }
        .selecionado { outline: 2px solid var(--azul) !important; background: rgba(9, 132, 227, 0.1); }
        
        /* DESTAQUE DE PREÇO */
        .selo-preco { 
            background: #ff0000; border-radius: 50%; width: 280px; height: 280px; 
            display: flex; align-items: center; justify-content: center; color: white; 
        }

        /* EDITOR */
        .editor-panel { width: 350px; background: white; padding: 20px; border-left: 1px solid #ccc; display: none; flex-direction: column; gap: 15px; overflow-y: auto; }
        .campo { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; }

        @media print { .toolbar, .editor-panel { display: none !important; } }
    </style>
</head>
<body>

<div class="toolbar">
    <div style="font-weight:900;">CARTAZISTA PRO 11.0</div>
    <button class="btn btn-add" onclick="adicionarCartaz()">✚ NOVO CARTAZ</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ IMPRIMIR</button>
</div>

<div class="main-container">
    <div class="workspace">
        <div id="folha-impressao" class="grid-4"></div>
    </div>

    <div class="editor-panel" id="edPanel">
        <h3 id="edTitulo">Editar Item</h3>
        
        <div class="campo" id="campoTexto">
            <label>Texto do Item</label>
            <input type="text" id="inputTexto" oninput="atualizarValor()">
        </div>

        <div class="campo">
            <label>Tamanho da Fonte</label>
            <input type="range" id="inputSize" min="10" max="500" oninput="atualizarValor()">
        </div>

        <div class="campo">
            <label>Cor do Elemento</label>
            <input type="color" id="inputColor" onchange="atualizarValor()">
        </div>

        <hr>
        <button class="btn" onclick="centralizar()" style="background:var(--azul); color:white; margin-bottom:5px">↔ CENTRALIZAR NO CARTAZ</button>
        <button class="btn" onclick="toggleSelo()" style="background:#f1c40f; color:#000">🟡 ALTERNAR SELO DE FUNDO</button>
    </div>
</div>

<script>
    let cartazes = [];
    let itemSelecionado = null;
    let arrastando = false;
    let mouseOffset = { x: 0, y: 0 };

    function adicionarCartaz() {
        const id = Date.now();
        cartazes.push({
            id: id,
            itens: [
                { id: 'desc-'+id, tipo: 'txt', val: 'NOME DO PRODUTO', x: 40, y: 30, size: 45, col: '#000', font: 'Bebas Neue', selo: false },
                { id: 'marca-'+id, tipo: 'txt', val: 'MARCA / PESO', x: 40, y: 95, size: 22, col: '#d63031', font: 'Bebas Neue', selo: false },
                { id: 'preco-'+id, tipo: 'preco', val: '14.90', x: 80, y: 160, size: 130, col: '#000', font: 'Anton', selo: true }
            ]
        });
        renderizar();
    }

    function renderizar() {
        const folha = document.getElementById('folha-impressao');
        folha.innerHTML = '';

        cartazes.forEach(c => {
            const area = document.createElement('div');
            area.className = 'cartaz-area';
            
            c.itens.forEach(it => {
                const el = document.createElement('div');
                el.id = it.id;
                el.className = `item-movel ${it.selo ? 'selo-preco' : ''}`;
                el.style.left = it.x + 'px';
                el.style.top = it.y + 'px';
                el.style.fontSize = it.size + 'px';
                el.style.color = it.col;
                el.style.fontFamily = it.font;

                if(it.tipo === 'txt') {
                    el.innerText = it.val;
                } else {
                    const partes = it.val.replace(',', '.').split('.');
                    el.innerHTML = `<small style="font-size:0.35em; position:relative; top:-0.3em">R$</small>${partes[0]}<small style="font-size:0.5em; border-bottom: 4px solid; margin-left:2px">,${partes[1] || '00'}</small>`;
                }

                el.onmousedown = (e) => selecionarItem(e, it, el);
                area.appendChild(el);
            });
            folha.appendChild(area);
        });
    }

    function selecionarItem(e, dados, elemento) {
        itemSelecionado = { dados, elemento };
        arrastando = true;
        
        document.querySelectorAll('.item-movel').forEach(i => i.classList.remove('selecionado'));
        elemento.classList.add('selecionado');

        mouseOffset.x = e.clientX - elemento.offsetLeft;
        mouseOffset.y = e.clientY - elemento.offsetTop;

        // Atualizar Painel
        document.getElementById('edPanel').style.display = 'flex';
        document.getElementById('inputTexto').value = dados.val;
        document.getElementById('inputSize').value = dados.size;
        document.getElementById('inputColor').value = dados.col;
        
        // Titulo dinâmico no editor
        const tipoLabel = dados.id.includes('desc') ? 'Descrição' : (dados.id.includes('marca') ? 'Marca' : 'Preço');
        document.getElementById('edTitulo').innerText = 'Editando: ' + tipoLabel;
    }

    function atualizarValor() {
        if(!itemSelecionado) return;
        itemSelecionado.dados.val = document.getElementById('inputTexto').value;
        itemSelecionado.dados.size = document.getElementById('inputSize').value;
        itemSelecionado.dados.col = document.getElementById('inputColor').value;
        renderizar();
        document.getElementById(itemSelecionado.dados.id).classList.add('selecionado');
    }

    function centralizar() {
        if(!itemSelecionado) return;
        const pai = document.getElementById(itemSelecionado.dados.id).parentElement;
        const larguraPai = pai.offsetWidth;
        const larguraItem = document.getElementById(itemSelecionado.dados.id).offsetWidth;
        
        itemSelecionado.dados.x = (larguraPai / 2) - (larguraItem / 2);
        renderizar();
        document.getElementById(itemSelecionado.dados.id).classList.add('selecionado');
    }

    function toggleSelo() {
        if(!itemSelecionado) return;
        itemSelecionado.dados.selo = !itemSelecionado.dados.selo;
        renderizar();
        document.getElementById(itemSelecionado.dados.id).classList.add('selecionado');
    }

    document.onmousemove = (e) => {
        if(!arrastando || !itemSelecionado) return;
        itemSelecionado.dados.x = e.clientX - mouseOffset.x;
        itemSelecionado.dados.y = e.clientY - mouseOffset.y;
        itemSelecionado.elemento.style.left = itemSelecionado.dados.x + 'px';
        itemSelecionado.elemento.style.top = itemSelecionado.dados.y + 'px';
    };

    document.onmouseup = () => arrastando = false;

    adicionarCartaz();
</script>
</body>
</html>
