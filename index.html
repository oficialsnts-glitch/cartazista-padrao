<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GB SISTEMAS - HUB</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        :root { --primary: #4361ee; --dark: #1a1b2e; --bg: #f0f2f8; }
        body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; }
        .header { background: var(--primary); width: 100%; padding: 50px 20px; text-align: center; color: white; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        .grid-apps { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 30px 20px; width: 100%; max-width: 500px; }
        .app-card { background: white; padding: 25px; border-radius: 25px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-decoration: none; color: var(--dark); }
        .app-card i { font-size: 45px; display: block; margin-bottom: 12px; }
        #tela-login { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 35px; width: 85%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="tela-login">
        <div class="login-box">
            <h2>GB Sistemas</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div class="header">
        <h1 style="margin:0;">PAINEL GB</h1>
        <p id="user-info">Carregando...</p>
    </div>

    <div class="grid-apps">
        <a href="financeiro.html" class="app-card"><i>💰</i><b>Financeiro</b></a>
        <a href="validade.html" class="app-card"><i>📅</i><b>Validades</b></a>
        <div class="app-card" onclick="sair()" style="background: #fff5f5;"><i style="color:#ff4d4d">🚪</i><b style="color:#ff4d4d">Sair</b></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB1Z5EuMscjAGFcbIEvpPsDkp-hiIYh28o",
            authDomain: "meu-finan.firebaseapp.com",
            projectId: "meu-finan",
            storageBucket: "meu-finan.firebasestorage.app",
            messagingSenderId: "867200475066",
            appId: "1:867200475066:web:f90351b3d65a8a8df00783"
        };
        firebase.initializeApp(firebaseConfig);
        firebase.auth().onAuthStateChanged(user => {
            if (user) { document.getElementById('tela-login').style.display = 'none'; document.getElementById('user-info').innerText = user.email; }
            else { document.getElementById('tela-login').style.display = 'flex'; }
        });
        async function login() {
            const e = document.getElementById('email').value; const s = document.getElementById('pass').value;
            try { await firebase.auth().signInWithEmailAndPassword(e, s); } catch(err) { alert("Erro de login: " + err.message); }
        }
        function sair() { firebase.auth().signOut(); }
    </script>
</body>
</html>
