<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cartazista Pro 5.0 - BR & Memória</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Anton&display=swap" rel="stylesheet">

    <style>
        :root { --azul: #0984e3; --danger: #d63031; --sucesso: #00b894; }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        body { font-family: 'Segoe UI', sans-serif; background: #cbd5e0; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* TOOLBAR SUPERIOR */
        .toolbar {
            background: #2d3436; padding: 10px 20px; display: flex; gap: 10px; 
            align-items: center; color: white; z-index: 1000;
        }
        .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-add { background: var(--sucesso); color: white; }
        .btn-save { background: #f1c40f; color: #000; }
        .btn-load { background: #9b59b6; color: white; }
        .btn-print { background: var(--danger); color: white; }

        /* LAYOUT */
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* GALERIA DE SELOS BR */
        .sidebar-selos {
            width: 140px; background: #dfe6e9; padding: 10px; 
            display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #b2bec3;
        }
        .selo-br {
            width: 100%; height: 80px; cursor: pointer; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            text-align: center; font-family: 'Bebas Neue'; color: white;
            font-size: 18px; line-height: 1; transition: 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .selo-br:hover { transform: scale(1.05); }
        .bg-oferta { background: #d63031; border: 3px double white; }
        .bg-horti { background: #27ae60; border-radius: 50% 50% 10% 10%; }
        .bg-limpeza { background: #0984e3; clip-path: polygon(10% 0, 90% 0, 100% 100%, 0% 100%); }

        /* ÁREA DE TRABALHO */
        .workspace { flex: 1; overflow: auto; padding: 40px; display: flex; justify-content: center; background: #7f8c8d; }
        #folha-impressao {
            width: 210mm; background: white; display: grid; grid-template-columns: 1fr 1fr;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); min-height: 297mm;
        }
        .cartaz-area { height: 148.5mm; border: 0.2mm dashed #ccc; position: relative; overflow: hidden; background: #fff; }

        /* ITENS */
        .item-movel { position: absolute; cursor: move; user-select: none; }
        .selecionado { outline: 2px solid var(--azul) !important; z-index: 1000 !important; }

        /* EDITOR LATERAL */
        .editor-panel { width: 280px; background: white; padding: 20px; border-left: 1px solid #ccc; display: none; flex-direction: column; gap: 15px; }
        .campo { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 10px; font-weight: bold; color: #666; }
        input, select { padding: 8px; border: 1px solid #ddd; }

        @media print {
            .toolbar, .sidebar-selos, .editor-panel { display: none !important; }
            body { background: white; overflow: visible; }
            .main-container { display: block; }
            #folha-impressao { margin: 0; box-shadow: none; border: none; }
            .cartaz-area { border: 0.1mm solid #eee !important; }
        }
    </style>
</head>
<body>

<div class="toolbar">
    <span style="font-weight:bold; color:var(--sucesso)">PRO 5.0</span>
    <button class="btn btn-add" onclick="adicionarCartaz()">+ Novo (A6)</button>
    <button class="btn btn-save" onclick="salvarProjeto()">💾 Salvar</button>
    <input type="file" id="inputLoad" style="display:none" onchange="abrirProjeto(this)">
    <button class="btn btn-load" onclick="document.getElementById('inputLoad').click()">📂 Abrir</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ Imprimir</button>
</div>

<div class="main-container">
    <div class="sidebar-selos">
        <label>SELOS BR</label>
        <div class="selo-br bg-oferta" onclick="addSeloTxt('OFERTA', '#d63031')">OFERTA</div>
        <div class="selo-br bg-horti" onclick="addSeloTxt('HORTI FRUTI', '#27ae60')">HORTI<br>FRUTI</div>
        <div class="selo-br bg-limpeza" onclick="addSeloTxt('LIMPEZA', '#0984e3')">LIMPEZA</div>
        <div class="selo-br" style="background:#f39c12" onclick="addSeloTxt('PADARIA', '#f39c12')">PADARIA</div>
        <div style="font-size: 10px; color:#666; text-align:center">Clique para inserir no cartaz</div>
    </div>

    <div class="workspace">
        <div id="folha-impressao"></div>
    </div>

    <div class="editor-panel" id="edPanel">
        <h4 style="margin:0">Ajustes</h4>
        <div class="campo">
            <label>Texto / Preço (use vírgula)</label>
            <input type="text" id="edVal" oninput="aplicar()">
        </div>
        <div class="campo">
            <label>Tamanho</label>
            <input type="range" id="edSize" min="10" max="600" oninput="aplicar()">
        </div>
        <div class="campo">
            <label>Cor</label>
            <input type="color" id="edColor" onchange="aplicar()">
        </div>
        <div class="campo">
            <label>Fonte</label>
            <select id="edFont" onchange="aplicar()">
                <option value="'Bebas Neue'">Bebas Neue</option>
                <option value="'Archivo Black'">Archivo Black</option>
                <option value="'Anton'">Anton</option>
            </select>
        </div>
        <button class="btn" style="background:#636e72; color:white; width:100%" onclick="remover()">Excluir</button>
    </div>
</div>

<script>
    let cartazes = [];
    let sel = null;
    let dragging = false;
    let offset = { x: 0, y: 0 };

    function adicionarCartaz() {
        const id = Date.now();
        cartazes.push({
            id: id,
            itens: [
                { id: 't'+id, tipo: 'txt', val: 'NOME DO PRODUTO', x: 20, y: 30, size: 35, font: "'Bebas Neue'", col: '#000' },
                { id: 'p'+id, tipo: 'preco', reais: '0', cent: '00', x: 40, y: 150, size: 150, font: "'Anton'", col: '#d63031' }
            ]
        });
        render();
    }

    function addSeloTxt(texto, cor) {
        if(!cartazes.length) adicionarCartaz();
        const c = cartazes[cartazes.length-1];
        c.itens.push({ id: 's'+Date.now(), tipo: 'selo', val: texto, x: 200, y: 20, size: 40, col: '#fff', bg: cor });
        render();
    }

    function render() {
        const f = document.getElementById('folha-impressao');
        f.innerHTML = '';
        cartazes.forEach(c => {
            const area = document.createElement('div');
            area.className = 'cartaz-area';
            c.itens.forEach(it => {
                const el = document.createElement('div');
                el.className = 'item-movel';
                el.id = it.id;
                el.style.left = it.x + 'px'; el.style.top = it.y + 'px';
                el.style.fontSize = it.size + 'px'; el.style.fontFamily = it.font || "'Bebas Neue'";
                el.style.color = it.col;

                if(it.tipo === 'txt') el.innerText = it.val;
                else if(it.tipo === 'selo') {
                    el.innerText = it.val;
                    el.style.background = it.bg;
                    el.style.padding = '5px 15px';
                    el.style.border = '2px solid white';
                }
                else if(it.tipo === 'preco') {
                    el.innerHTML = `<div style="display:flex"><span style="font-size:0.3em; margin-top:0.2em">R$</span>${it.reais}<span style="font-size:0.5em; border-bottom:4px solid">,${it.cent}</span></div>`;
                }

                el.onmousedown = (e) => {
                    sel = { data: it, el: el }; dragging = true;
                    document.querySelectorAll('.item-movel').forEach(i => i.classList.remove('selecionado'));
                    el.classList.add('selecionado');
                    offset.x = e.clientX - el.offsetLeft; offset.y = e.clientY - el.offsetTop;
                    document.getElementById('edPanel').style.display = 'flex';
                    document.getElementById('edVal').value = it.tipo === 'preco' ? `${it.reais},${it.cent}` : it.val;
                    document.getElementById('edSize').value = it.size;
                    document.getElementById('edColor').value = it.col;
                };
                area.appendChild(el);
            });
            f.appendChild(area);
        });
    }

    function aplicar() {
        if(!sel) return;
        const d = sel.data;
        d.size = document.getElementById('edSize').value;
        d.col = document.getElementById('edColor').value;
        d.font = document.getElementById('edFont').value;
        if(d.tipo === 'txt' || d.tipo === 'selo') d.val = document.getElementById('edVal').value;
        else if(d.tipo === 'preco') {
            const v = document.getElementById('edVal').value.split(',');
            d.reais = v[0]; d.cent = v[1] || '00';
        }
        render();
        document.getElementById(d.id).classList.add('selecionado');
    }

    function remover() {
        cartazes.forEach(c => c.itens = c.itens.filter(i => i.id !== sel.data.id));
        document.getElementById('edPanel').style.display = 'none';
        render();
    }

    // MEMÓRIA: SALVAR E ABRIR
    function salvarProjeto() {
        const data = JSON.stringify(cartazes);
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'meus-cartazes.json';
        a.click();
    }

    function abrirProjeto(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            cartazes = JSON.parse(e.target.result);
            render();
        };
        reader.readAsText(input.files[0]);
    }

    document.onmousemove = (e) => {
        if(!dragging) return;
        sel.data.x = e.clientX - offset.x; sel.data.y = e.clientY - offset.y;
        sel.el.style.left = sel.data.x + 'px'; sel.el.style.top = sel.data.y + 'px';
    };
    document.onmouseup = () => dragging = false;

    adicionarCartaz();
</script>
</body>
</html>
