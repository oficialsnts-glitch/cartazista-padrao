<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartazista Pro - Versão Ultra Final</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Oswald:wght@700&display=swap');

        :root {
            --vermelho: #e61e25; --verde: #009432; --preto: #1e272e; 
            --azul: #0984e3; --laranja: #f39c12; --roxo: #8e44ad;
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        body { font-family: 'Archivo Black', sans-serif; background-color: #cbd5e0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }

        /* Painel Administrativo */
        .painel { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; max-width: 950px; border-top: 6px solid var(--vermelho); }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #666; margin-bottom: 3px; }
        input, select { padding: 10px; border: 2px solid #eee; border-radius: 6px; font-size: 14px; }
        
        .botoes-topo { display: flex; gap: 8px; margin-top: 10px; }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-add { flex: 2; background: var(--preto); color: #fff; padding: 15px; border: none; border-radius: 6px; }
        .btn-print { flex: 1; background: var(--vermelho); color: #fff; padding: 15px; border: none; border-radius: 6px; }

        /* Área de Impressão */
        #container-impressao { width: 210mm; margin: 0 auto; background: #fff; display: grid; }
        .layout-1 { grid-template-columns: 1fr; }
        .layout-2 { grid-template-columns: 1fr; gap: 2mm; }
        .layout-4 { grid-template-columns: 1fr 1fr; gap: 1mm; }

        .cartaz-item { 
            width: 100%; position: relative; overflow: hidden; 
            border: 1px dashed #ccc; background: #fff; text-align: center;
        }
        .layout-1 .cartaz-item { height: 297mm; }
        .layout-2 .cartaz-item { height: 148.5mm; }
        .layout-4 .cartaz-item { height: 148.5mm; }

        /* Selos */
        .selo-topo { width: 120%; padding: 15px 0; transform: rotate(-1deg); position: absolute; top: -5px; left: -10%; z-index: 1; pointer-events: none; }
        .selo-topo span { font-size: 4.5rem; color: #fff; display: block; }
        .tema-oferta { background: var(--vermelho); }
        .tema-horti { background: var(--verde); }
        .tema-bebidas { background: var(--azul); }
        .tema-validade { background: var(--laranja); }
        .tema-unidades { background: var(--roxo); }

        /* Elementos Móveis e Editáveis */
        .movel { position: absolute; cursor: move; width: 100%; left: 0; z-index: 2; }
        .movel:hover { outline: 1px dashed var(--azul); }
        [contenteditable="true"]:focus { outline: 2px solid var(--azul); background: rgba(9, 132, 227, 0.05); }

        .nome-produto { color: #444; text-transform: uppercase; line-height: 1; }
        .marca-produto { font-weight: 900; color: #000; text-transform: uppercase; line-height: 0.85; }
        .gramatura { color: #333; font-weight: bold; line-height: 1; }

        /* Preço */
        .preco-box { display: flex; justify-content: center; align-items: flex-start; color: var(--vermelho); }
        .rs { margin-top: 8%; margin-right: 5px; font-weight: 900; }
        .reais { line-height: 0.7; letter-spacing: -5px; font-weight: 900; }
        .dir-box { display: flex; flex-direction: column; margin-top: 8%; text-align: left; }
        .centavos { line-height: 0.8; border-bottom: 0.1em solid; font-weight: 900; }
        .unidade-txt { font-weight: 900; color: #000; text-transform: uppercase; }

        /* Controles Flutuantes Restaurados e Ampliados */
        .controles-item { 
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 4px; background: rgba(255,255,255,0.95);
            padding: 8px; border: 2px solid #333; border-radius: 8px; z-index: 100;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; font-size: 8px; font-weight: bold; }
        .btn-small { width: 28px; height: 28px; border: 1px solid #333; background: #fff; cursor: pointer; font-size: 16px; border-radius: 4px; }
        .btn-delete { position: absolute; top: 10px; right: 10px; background: var(--vermelho); color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; z-index: 101; font-size: 20px; }

        @media print {
            .painel, .controles-item, .btn-delete { display: none !important; }
            #container-impressao { width: 100%; border: none; }
            .cartaz-item { border: none !important; page-break-after: always; }
            .movel:hover { outline: none; }
        }
    </style>
</head>
<body>

    <div class="painel">
        <h2 style="text-align:center; margin:0 0 15px 0;">🛒 Cartazista Pro - Versão Ultra</h2>
        <div class="grid-inputs">
            <div class="input-group"><label>Layout</label>
                <select id="selLayout" onchange="renderizar()">
                    <option value="layout-4">4 Por Folha</option>
                    <option value="layout-2">2 Por Folha</option>
                    <option value="layout-1">1 Por Folha</option>
                </select>
            </div>
            <div class="input-group"><label>Tema</label>
                <select id="selTema">
                    <option value="tema-oferta">OFERTA</option>
                    <option value="tema-horti">HORTIFRUTI</option>
                    <option value="tema-bebidas">BEBIDAS</option>
                    <option value="tema-validade">VALIDADE PRÓXIMA</option>
                    <option value="tema-unidades">ÚLTIMAS UNIDADES</option>
                </select>
            </div>
            <div class="input-group"><label>Fonte</label>
                <select id="selFonte">
                    <option value="'Archivo Black', sans-serif">Padrão (Larga)</option>
                    <option value="'Oswald', sans-serif">Condensada (Estreita)</option>
                </select>
            </div>
        </div>
        <div class="grid-inputs">
            <div class="input-group"><label>Produto</label><input type="text" id="inProd" placeholder="Ex: Arroz"></div>
            <div class="input-group"><label>Marca</label><input type="text" id="inMarca" placeholder="Ex: Tio Urbano"></div>
            <div class="input-group"><label>Gramatura</label><input type="text" id="inGram" placeholder="Ex: 5kg"></div>
        </div>
        <div class="grid-inputs">
            <div class="input-group"><label>Reais</label><input type="number" id="inR" value="0"></div>
            <div class="input-group"><label>Centavos</label><input type="number" id="inC" value="00"></div>
            <div class="input-group"><label>Unidade</label><input type="text" id="inU" value="UN"></div>
        </div>
        <div class="botoes-topo">
            <button class="btn-add" onclick="adicionar()">➕ Adicionar Cartaz</button>
            <button class="btn-print" onclick="window.print()">🖨️ Gerar Impressão</button>
        </div>
    </div>

    <div id="container-impressao" class="layout-4"></div>

    <script>
        let cartazes = [];
        let dragElement = null;
        let startY = 0;
        let startTop = 0;

        function adicionar() {
            const layout = document.getElementById('selLayout').value;
            const config = {
                'layout-1': { p: 2.5, m: 12, r: 30, g: 2.2, posP: 250, pos$: 600 },
                'layout-2': { p: 1.5, m: 7, r: 18, g: 1.3, posP: 120, pos$: 300 },
                'layout-4': { p: 1, m: 4.5, r: 11, g: 0.9, posP: 100, pos$: 280 }
            }[layout];

            cartazes.push({
                id: Date.now(),
                tema: document.getElementById('selTema').value,
                temaTxt: document.getElementById('selTema').options[document.getElementById('selTema').selectedIndex].text,
                prod: document.getElementById('inProd').value.toUpperCase(),
                marca: document.getElementById('inMarca').value.toUpperCase(),
                gram: document.getElementById('inGram').value,
                r: document.getElementById('inR').value,
                c: document.getElementById('inC').value.toString().padStart(2, '0'),
                u: document.getElementById('inU').value.toUpperCase(),
                fP: config.p, fM: config.m, fR: config.r, fG: config.g,
                posProd: config.posP, posPreco: config.pos$ ,
                familia: document.getElementById('selFonte').value
            });
            renderizar();
        }

        function ajustar(id, campo, delta) {
            const c = cartazes.find(item => item.id === id);
            if(c) { c[campo] += delta; renderizar(); }
        }

        function remover(id) {
            cartazes = cartazes.filter(c => c.id !== id);
            renderizar();
        }

        // Sistema de Arraste
        function startDrag(e, id, campoPos) {
            if(e.target.getAttribute('contenteditable')) return; // Não arrasta se estiver editando texto
            dragElement = { id, campoPos };
            startY = e.clientY;
            const el = e.currentTarget;
            startTop = parseInt(el.style.top) || 0;
            document.onmousemove = doDrag;
            document.onmouseup = stopDrag;
        }

        function doDrag(e) {
            if (!dragElement) return;
            const delta = e.clientY - startY;
            const c = cartazes.find(item => item.id === dragElement.id);
            c[dragElement.campoPos] = startTop + delta;
            const el = document.getElementById(`${dragElement.campoPos}-${dragElement.id}`);
            if(el) el.style.top = (startTop + delta) + "px";
        }

        function stopDrag() { dragElement = null; document.onmousemove = null; document.onmouseup = null; }

        function renderizar() {
            const container = document.getElementById('container-impressao');
            container.className = document.getElementById('selLayout').value;
            container.innerHTML = "";

            cartazes.forEach(c => {
                container.innerHTML += `
                    <div class="cartaz-item" style="font-family: ${c.familia}">
                        <button class="btn-delete" onclick="remover(${c.id})">✕</button>
                        
                        <div class="controles-item">
                            <div class="control-group">PROD<div class="btns-row">
                                <button class="btn-small" onclick="ajustar(${c.id},'fP',-0.1)">-</button>
                                <button class="btn-small" onclick="ajustar(${c.id},'fP',0.1)">+</button>
                            </div></div>
                            <div class="control-group">MARCA<div class="btns-row">
                                <button class="btn-small" onclick="ajustar(${c.id},'fM',-0.2)">-</button>
                                <button class="btn-small" onclick="ajustar(${c.id},'fM',0.2)">+</button>
                            </div></div>
                            <div class="control-group">PREÇO<div class="btns-row">
                                <button class="btn-small" onclick="ajustar(${c.id},'fR',-1)">-</button>
                                <button class="btn-small" onclick="ajustar(${c.id},'fR',1)">+</button>
                            </div></div>
                        </div>

                        <div class="selo-topo ${c.tema}"><span>${c.temaTxt}</span></div>
                        
                        <div id="posProd-${c.id}" class="movel" style="top: ${c.posProd}px" onmousedown="startDrag(event, ${c.id}, 'posProd')">
                            <div contenteditable="true" class="nome-produto" style="font-size: ${c.fP}rem">${c.prod}</div>
                            <div contenteditable="true" class="marca-produto" style="font-size: ${c.fM}rem">${c.marca}</div>
                            <div contenteditable="true" class="gramatura" style="font-size: ${c.fG}rem">${c.gram}</div>
                        </div>

                        <div id="posPreco-${c.id}" class="movel" style="top: ${c.posPreco}px" onmousedown="startDrag(event, ${c.id}, 'posPreco')">
                            <div class="preco-box">
                                <span class="rs" style="font-size: ${c.fR * 0.12}rem">R$</span>
                                <span contenteditable="true" class="reais" style="font-size: ${c.fR}rem">${c.r}</span>
                                <div class="dir-box">
                                    <span contenteditable="true" class="centavos" style="font-size: ${c.fR * 0.35}rem">${c.c}</span>
                                    <span contenteditable="true" class="unidade-txt" style="font-size: ${c.fR * 0.08}rem">${c.u}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
