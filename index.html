<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartazista Pro - v6.2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');

        :root {
            --vermelho: #e61e25; --verde: #009432; --laranja: #f39c12; 
            --amarelo: #ffc312; --preto: #1e272e; --azul: #0984e3;
            --roxo-validade: #6c5ce7;
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }

        body { font-family: 'Archivo Black', sans-serif; background-color: #cbd5e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Interface de Controle */
        .painel { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 30px; width: 100%; max-width: 800px; border-top: 5px solid var(--vermelho); }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 10px; text-transform: uppercase; color: #718096; margin-bottom: 2px; font-weight: bold; }
        input, select { padding: 8px; border: 2px solid #edf2f7; border-radius: 6px; font-size: 14px; }
        .botoes { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-add { background: var(--preto); color: white; }
        .btn-print { background: var(--vermelho); color: white; }
        #group-validade { display: none; }

        /* Área de Impressão */
        #container-impressao { width: 210mm; margin: 0 auto; background: #fff; display: grid; }
        
        /* Layout 1 (A4) */
        .layout-1 { grid-template-columns: 1fr; padding: 0; }
        .layout-1 .cartaz-item { height: 296mm; --f-topo: 5.5em; --f-prod: 2.2em; --f-reais: 28em; border: none; }

        /* Layout 2 (A5) */
        .layout-2 { grid-template-columns: 1fr; row-gap: 5mm; padding: 5mm; }
        .layout-2 .cartaz-item { height: 138mm; --f-topo: 3.2em; --f-prod: 1.4em; --f-reais: 14em; }

        /* Layout 4 (A6) */
        .layout-4 { grid-template-columns: 1fr 1fr; gap: 2mm; padding: 2mm; }
        .layout-4 .cartaz-item { height: 142mm; --f-topo: 1.8em; --f-prod: 1em; --f-reais: 9.5em; }

        .cartaz-item { 
            width: 100%; background: #fff; display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; position: relative; overflow: hidden; 
            border: 1px dashed #ccc; padding: 0 10px 15px 10px; page-break-inside: avoid;
        }

        .selo-topo { width: 120%; padding: 15px 0; text-align: center; transform: rotate(-1.5deg); margin-top: -10px; }
        .selo-topo span { font-size: var(--f-topo); color: #fff; text-transform: uppercase; display: block; }

        /* Cores Temas */
        .tema-oferta { background: var(--vermelho); }
        .tema-horti { background: var(--verde); }
        .tema-bebidas { background: var(--azul); }
        .tema-queima { background: var(--laranja); }
        .tema-ultimas { background: var(--amarelo); }
        .tema-ultimas span { color: #000; }
        .tema-validade { background: #1a237e; }

        .info-produto { text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; width: 100%; }
        .nome-produto { font-size: var(--f-prod); color: #718096; margin: 0; text-transform: uppercase; }
        
        /* Marca Adaptativa */
        .marca-produto { 
            width: 100%; text-transform: uppercase; line-height: 0.85; 
            letter-spacing: -2px; margin: 5px 0; white-space: nowrap; 
            font-weight: 900; color: #000; display: block;
        }

        .gramatura-produto { font-size: 1.3em; color: #000; font-weight: bold; }
        .selo-validade-info { background: var(--roxo-validade); color: white; padding: 4px 15px; border-radius: 50px; font-size: 0.9em; margin-top: 5px; display: inline-block; align-self: center; }

        /* Preço */
        .preco-box { display: flex; align-items: flex-start; justify-content: center; width: 100%; margin-top: auto; }
        .rs { font-size: calc(var(--f-reais) * 0.15); margin-top: 10%; margin-right: 4px; color: #000; }
        .reais { font-size: var(--f-reais); line-height: 0.75; color: var(--vermelho); letter-spacing: -10px; }
        
        .tema-horti ~ .preco-box .reais, .tema-horti ~ .preco-box .centavos { color: var(--verde); }
        .tema-bebidas ~ .preco-box .reais, .tema-bebidas ~ .preco-box .centavos { color: var(--azul); }
        .tema-validade ~ .preco-box .reais, .tema-validade ~ .preco-box .centavos { color: var(--roxo-validade); }

        .dir-box { display: flex; flex-direction: column; margin-top: 5%; }
        .centavos { font-size: calc(var(--f-reais) * 0.35); line-height: 1; color: var(--vermelho); border-bottom: 8px solid; }
        .unidade { font-size: calc(var(--f-reais) * 0.08); font-weight: 900; text-transform: uppercase; color: #000; }

        /* Botões de Ação no Cartaz */
        .acoes { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; z-index: 100; }
        .btn-acao { background: #fff; border: 1px solid #ccc; width: 30px; height: 30px; cursor: pointer; border-radius: 4px; font-size: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-clone { color: #0984e3; }
        .btn-del { color: #e61e25; }

        @media print {
            body { padding: 0; background: #fff; }
            .painel, .acoes { display: none !important; }
            #container-impressao { width: 100%; border: none; }
            .layout-1 .cartaz-item { height: 100vh; page-break-after: always; border: none; }
        }
    </style>
</head>
<body>

    <div class="painel">
        <h2 style="text-align:center; margin: 0 0 15px 0;">🛒 Cartazista Pro v6.2</h2>
        <div class="grid-inputs">
            <div class="input-group"><label>Tema</label>
                <select id="selTema" onchange="toggleValidade()">
                    <option value="tema-oferta">OFERTA</option>
                    <option value="tema-validade">VALIDADE PRÓXIMA</option>
                    <option value="tema-horti">HORTIFRUTI</option>
                    <option value="tema-bebidas">BEBIDAS</option>
                    <option value="tema-queima">QUEIMA TOTAL</option>
                    <option value="tema-ultimas">SÓ HOJE</option>
                </select>
            </div>
            <div class="input-group" id="group-validade"><label>Vencimento</label><input type="text" id="inVenc" placeholder="16.02"></div>
            <div class="input-group"><label>Layout</label>
                <select id="selLayout" onchange="renderizar()">
                    <option value="layout-2">2 por Folha (A5)</option>
                    <option value="layout-1">1 por Folha (A4)</option>
                    <option value="layout-4">4 por Folha (A6)</option>
                </select>
            </div>
        </div>
        <div class="grid-inputs">
            <div class="input-group"><label>Produto (Menor)</label><input type="text" id="inProd"></div>
            <div class="input-group"><label>Marca (DESTAQUE)</label><input type="text" id="inMarca"></div>
            <div class="input-group"><label>Peso</label><input type="text" id="inGram"></div>
        </div>
        <div class="grid-inputs">
            <div class="input-group"><label>Reais</label><input type="number" id="inR"></div>
            <div class="input-group"><label>Centavos</label><input type="number" id="inC"></div>
            <div class="input-group"><label>Unid.</label><input type="text" id="inU" placeholder="UN/KG"></div>
        </div>
        <div class="botoes">
            <button class="btn-add" onclick="adicionar()">➕ Adicionar</button>
            <button class="btn-print" onclick="window.print()">🖨️ Imprimir</button>
        </div>
    </div>

    <div id="container-impressao" class="layout-2"></div>

    <script>
        let cartazes = JSON.parse(localStorage.getItem('cartazes_v62')) || [];

        function toggleValidade() {
            const tema = document.getElementById('selTema').value;
            document.getElementById('group-validade').style.display = (tema === 'tema-validade') ? 'flex' : 'none';
        }

        function adicionar() {
            if(!document.getElementById('inMarca').value) return alert("Digite a Marca!");
            const item = {
                id: Date.now(),
                tema: document.getElementById('selTema').value,
                temaTexto: document.getElementById('selTema').options[document.getElementById('selTema').selectedIndex].text,
                vencimento: document.getElementById('inVenc').value,
                prod: document.getElementById('inProd').value,
                marca: document.getElementById('inMarca').value,
                gram: document.getElementById('inGram').value,
                r: document.getElementById('inR').value || '0',
                c: document.getElementById('inC').value || '00',
                u: document.getElementById('inU').value || 'UN'
            };
            cartazes.push(item);
            salvar();
        }

        function clonar(id) {
            const original = cartazes.find(c => c.id === id);
            if (original) {
                const copia = {...original, id: Date.now()};
                cartazes.push(copia);
                salvar();
            }
        }

        function remover(id) {
            cartazes = cartazes.filter(c => c.id !== id);
            salvar();
        }

        function salvar() {
            localStorage.setItem('cartazes_v62', JSON.stringify(cartazes));
            renderizar();
        }

        function renderizar() {
            const container = document.getElementById('container-impressao');
            const layout = document.getElementById('selLayout').value;
            container.className = layout;
            container.innerHTML = "";
            
            cartazes.forEach(c => {
                const centavos = c.c.toString().padStart(2, '0');
                const validade = c.vencimento ? `<div class="selo-validade-info">VÁLIDO ATÉ: ${c.vencimento}</div>` : "";
                
                container.innerHTML += `
                    <div class="cartaz-item">
                        <div class="acoes">
                            <button class="btn-acao btn-clone" onclick="clonar(${c.id})" title="Clonar">👯</button>
                            <button class="btn-acao btn-del" onclick="remover(${c.id})" title="Excluir">✕</button>
                        </div>
                        <div class="selo-topo ${c.tema}"><span>${c.temaTexto}</span></div>
                        <div class="info-produto">
                            <p class="nome-produto">${c.prod}</p>
                            <span class="marca-produto" id="m-${c.id}">${c.marca}</span>
                            <div class="gramatura-produto">${c.gram}</div>
                            ${validade}
                        </div>
                        <div class="preco-box">
                            <span class="rs">R$</span><span class="reais">${c.r}</span>
                            <div class="dir-box"><span class="centavos">${centavos}</span><span class="unidade">${c.u}</span></div>
                        </div>
                    </div>
                `;
                ajustarMarca(c.id, layout);
            });
        }

        function ajustarMarca(id, layout) {
            setTimeout(() => {
                const el = document.getElementById(`m-${id}`);
                const pai = el.parentElement;
                if (!el || !pai) return;

                // Valores de partida equilibrados
                let tamanho = 8.5; 
                if (layout === 'layout-1') tamanho = 18; 
                if (layout === 'layout-4') tamanho = 4.2; 

                el.style.fontSize = tamanho + "em";

                let limiteLargura = pai.offsetWidth * 0.92;
                // Reduz apenas se ultrapassar o limite lateral
                while (el.offsetWidth > limiteLargura && tamanho > 1) {
                    tamanho -= 0.1;
                    el.style.fontSize = tamanho + "em";
                }
            }, 20);
        }

        renderizar();
    </script>
</body>
</html>
