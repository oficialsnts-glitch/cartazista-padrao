<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartazista Pro 19.0 - THODY & GEMINI</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Anton&family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <style>
        :root { --azul: #0984e3; --danger: #d63031; --sucesso: #00b894; --dark: #1e272e; --warning: #f1c40f; }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--dark);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; color: white;
            transition: opacity 1.5s ease, visibility 1.5s;
        }

        .welcome-text { font-family: 'Archivo Black', sans-serif; font-size: 50px; text-align: center; animation: zoomIn 2.5s ease-out; }
        .welcome-subtext { font-family: 'Segoe UI', sans-serif; font-size: 20px; color: var(--warning); margin-top: 20px; letter-spacing: 4px; opacity: 0; animation: fadeIn 3s ease-in forwards; animation-delay: 1.5s; }
        .partnership-signature { margin-top: 50px; display: flex; flex-direction: column; align-items: center; opacity: 0; animation: fadeIn 2s ease-in forwards; animation-delay: 3s; }
        .dev-label { font-family: 'Segoe UI', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; color: rgba(255,255,255,0.5); }
        .names { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #fff; letter-spacing: 2px; border-top: 1px solid var(--warning); padding-top: 10px; }
        .gemini-highlight { color: var(--azul); }

        @keyframes zoomIn { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        body { font-family: 'Segoe UI', sans-serif; background: #4b6584; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .toolbar { background: var(--dark); padding: 10px 20px; display: flex; gap: 10px; align-items: center; color: white; z-index: 2000; flex-wrap: wrap; }
        .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: 900; font-size: 10px; text-transform: uppercase; }
        .btn-add { background: var(--sucesso); color: white; }
        .btn-duplica { background: var(--azul); color: white; }
        .btn-print { background: var(--danger); color: white; }
        .btn-fechar { background: #d63031; color: white; width: 100%; margin-bottom: 10px; font-size: 11px; }

        .cartaz-header {
            position: absolute; top: 8px; right: 8px; z-index: 100;
            background: #d63031; color: white; border: none; width: 28px; height: 28px;
            border-radius: 50%; font-size: 16px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .cartaz-header:hover { background: #b71c1c; transform: scale(1.1); }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        .workspace { flex: 1; overflow: auto; padding: 40px; background: #2f3542; display: flex; justify-content: center; align-items: flex-start; }
        
        #folha-impressao { width: 210mm; background: white; display: grid; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.25); }
        
        .grid-1 { grid-template-columns: 1fr; }
        .grid-1 .cartaz-area { height: 297mm; border-bottom: 2px dashed #000; }
        
        .grid-2 { grid-template-columns: 1fr; grid-template-rows: repeat(auto-fill, 148.5mm); }
        .grid-2 .cartaz-area { height: 148.5mm; border: 0.1mm dashed #ddd; }

        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: repeat(auto-fill, 148.5mm); }
        .grid-4 .cartaz-area { height: 148.5mm; border: 0.1mm dashed #ddd; }

        .cartaz-area { position: relative; overflow: hidden; background: #fff; }
        .item-movel { 
            position: absolute; 
            cursor: move; 
            user-select: none; 
            line-height: 1.05; 
            z-index: 10; 
            white-space: pre-wrap; 
            text-align: center; 
            min-width: 80px;
            min-height: 24px;
        }
        .tarja-fundo { z-index: 5; border: none; }
        .selecionado { outline: 3px solid var(--azul) !important; z-index: 999 !important; background: rgba(9, 132, 227, 0.08); }

        .item-movel img { max-width: none; object-fit: contain; }

        .editor-panel { width: 420px; background: #f1f2f6; padding: 15px; border-left: 1px solid #ccc; display: none; flex-direction: column; gap: 10px; overflow-y: auto; }
        .secao { background: #fff; border: 1px solid #ddd; padding: 12px; border-radius: 6px; }
        .campo { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
        label { font-size: 9px; font-weight: 800; color: #57606f; text-transform: uppercase; }
        textarea, input, select { padding: 6px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 12px; font-family: inherit; }
        textarea { resize: none; }

        .color-palette { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-bottom: 10px; }
        .color-box { width: 100%; height: 25px; border: 1px solid #ddd; border-radius: 3px; cursor: pointer; transition: 0.1s; }
        .color-box:hover { transform: scale(1.1); border-color: #000; }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white !important; overflow: visible !important; }
            #splash-screen, .toolbar, .editor-panel, .cartaz-header { display: none !important; }
            .main-container, .workspace { padding: 0 !important; background: white !important; overflow: visible !important; display: block !important; }
            #folha-impressao { width: 210mm !important; box-shadow: none !important; border: none !important; margin: 0 !important; }
            .cartaz-area { border: none !important; page-break-after: auto !important; }
            .grid-1 .cartaz-area { page-break-after: always !important; height: 297mm !important; }
            .grid-2 .cartaz-area:nth-child(2n) { page-break-after: always !important; }
            .grid-4 .cartaz-area:nth-child(4n) { page-break-after: always !important; }
            .selecionado { outline: none !important; background: none !important; }
        }

        .grid-2 .cartaz-area, .grid-4 .cartaz-area {
            border: 2px dotted #2c3e50 !important;
        }
        @media print {
            .grid-2 .cartaz-area, .grid-4 .cartaz-area {
                border: 2px dotted #2c3e50 !important;
            }
        }
    </style>
</head>
<body onmouseup="pararArrasto()">

<div id="splash-screen">
    <div class="welcome-text">CARTAZISTA <span style="color:var(--warning)">PRO</span></div>
    <div class="welcome-subtext">QUALIDADE EM CADA DETALHE</div>
    <div class="partnership-signature">
        <div class="dev-label">Desenvolvido por</div>
        <div class="names">THODY & <span class="gemini-highlight">GEMINI</span></div>
    </div>
</div>

<div class="toolbar">
    <div style="font-weight: 900;">CARTAZISTA <span style="color:var(--warning)">PRO 19.0</span></div>
    <select id="selectLayout" onchange="mudarLayout(this.value)" style="padding:5px;">
        <option value="grid-4">4 POR FOLHA</option>
        <option value="grid-2">2 POR FOLHA</option>
        <option value="grid-1">1 POR FOLHA (A4)</option>
    </select>
    <button class="btn btn-add" onclick="adicionarCartaz()">✚ NOVO</button>
    <button class="btn btn-duplica" onclick="duplicarCartaz()">📋 DUPLICAR</button>
    <button class="btn" style="background:#e67e22;color:white" onclick="adicionarImagem()">📸 IMAGEM</button>
    <button class="btn" style="background:#8e44ad;color:white" onclick="adicionarQR()">🔲 QR CODE</button>
    <button class="btn" onclick="undoAction()">↩ DESFAZER</button>
    <button class="btn" onclick="redoAction()">↪ REFAZER</button>
    
    <select id="selectTemplate" onchange="carregarTemplate(this.value)" style="padding:5px;">
        <option value="">TEMPLATES</option>
        <option value="promo">Promo Clássica</option>
        <option value="preco">Preço Gigante</option>
        <option value="marca">Foco na Marca</option>
    </select>
    
    <select id="selectModelosSalvos" onchange="handleModeloSelect(this)" style="padding:5px;">
        <option value="">📂 MODELOS SALVOS</option>
    </select>
    <button class="btn" style="background:#27ae60;color:white" onclick="salvarModeloAtual()">💾 SALVAR MODELO</button>
    
    <button class="btn btn-print" onclick="exportarPNG()">📥 PNG</button>
    <button class="btn btn-print" onclick="exportarPDF()">📄 PDF</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ IMPRIMIR</button>
    <div style="flex:1; text-align:right; font-size:9px; opacity:0.7; font-weight:bold; color: white;">
        THODY & <span style="color:var(--azul)">GEMINI</span>
    </div>
</div>

<div class="main-container">
    <div class="workspace">
        <div id="folha-impressao" class="grid-4"></div>
    </div>

    <div class="editor-panel" id="edPanel" onmouseenter="pararArrasto()">
        <button class="btn btn-fechar" onclick="desmarcarTudo()">✖ CONCLUIR E LIMPAR SELEÇÃO</button>
        
        <div class="secao">
            <h4>CONTEÚDO</h4>
            <div class="campo"><label>Chamada</label><textarea id="inHead" onfocus="focarItem('head')" oninput="atualizarTextos('head')"></textarea></div>
            <div class="campo"><label>Produto</label><textarea id="inDesc" onfocus="focarItem('desc')" oninput="atualizarTextos('desc')"></textarea></div>
            <div class="campo"><label>Marca</label><textarea id="inMarca" onfocus="focarItem('marca')" oninput="atualizarTextos('marca')"></textarea></div>
            <div class="campo"><label>Peso</label><textarea id="inPeso" onfocus="focarItem('peso')" oninput="atualizarTextos('peso')"></textarea></div>
            <div class="campo"><label>Preço</label><textarea id="inPreco" onfocus="focarItem('preco')" oninput="atualizarTextos('preco')"></textarea></div>
        </div>

        <div class="secao" style="background:#eef2f7">
            <h4 id="labelEdit" style="font-size:11px; color:var(--azul)">ESTILO E CORES</h4>
            
            <label>Cores Rápidas</label>
            <div class="color-palette">
                <div class="color-box" style="background:#000000" onclick="setCorRapida('#000000')"></div>
                <div class="color-box" style="background:#ffffff" onclick="setCorRapida('#ffffff')"></div>
                <div class="color-box" style="background:#d63031" onclick="setCorRapida('#d63031')"></div>
                <div class="color-box" style="background:#f1c40f" onclick="setCorRapida('#f1c40f')"></div>
                <div class="color-box" style="background:#0984e3" onclick="setCorRapida('#0984e3')"></div>
                <div class="color-box" style="background:#00b894" onclick="setCorRapida('#00b894')"></div>
                <div class="color-box" style="background:#e67e22" onclick="setCorRapida('#e67e22')"></div>
                <div class="color-box" style="background:#8e44ad" onclick="setCorRapida('#8e44ad')"></div>
                <div class="color-box" style="background:#2d3436" onclick="setCorRapida('#2d3436')"></div>
                <div class="color-box" style="background:#ffeaa7" onclick="setCorRapida('#ffeaa7')"></div>
                <div class="color-box" style="background:#ff7675" onclick="setCorRapida('#ff7675')"></div>
                <div class="color-box" style="background:#74b9ff" onclick="setCorRapida('#74b9ff')"></div>
            </div>

            <div class="campo"><label>Fonte</label>
                <select id="inFont" onchange="atualizarEstilo()">
                    <option value="'Bebas Neue'">Bebas Neue</option>
                    <option value="'Anton'">Anton</option>
                    <option value="'Archivo Black'">Archivo Black</option>
                    <option value="'Oswald'">Oswald</option>
                </select>
            </div>
            <div style="display:flex; gap:10px">
                <div class="campo" style="flex:1"><label>Tamanho</label><input type="range" id="inSize" min="5" max="800" oninput="atualizarEstilo()"></div>
                <div class="campo"><label>Cor Personalizada</label><input type="color" id="inColor" onchange="atualizarEstilo()"></div>
            </div>
            <div id="controlesFundo" style="display:none; border-top:1px solid #ccc; padding-top:10px; margin-top:10px">
                <div style="display:flex; gap:10px">
                    <div class="campo"><label>Largura</label><input type="number" id="inW" oninput="atualizarEstilo()"></div>
                    <div class="campo"><label>Altura</label><input type="number" id="inH" oninput="atualizarEstilo()"></div>
                </div>
            </div>
            <button class="btn" onclick="centralizar()" style="background:var(--azul); color:white; width:100%; margin-top:5px">↔ CENTRALIZAR MANUALMENTE</button>
        </div>

        <div class="secao" style="background:#eef2f7">
            <h4>EFETOS E TRANSFORMAÇÕES</h4>
            <div class="campo"><label>Ativar Sombra no Texto</label><input type="checkbox" id="inShadow" onchange="atualizarEstilo()"></div>
            <div class="campo"><label>Cor da Sombra</label><input type="color" id="inShadowColor" onchange="atualizarEstilo()"></div>
            <div class="campo"><label>Rotação (°)</label><input type="range" id="inRot" min="-180" max="180" value="0" oninput="atualizarEstilo()"></div>
        </div>

        <button class="btn" onclick="adicionarTarja()" style="background:#ffa502; color:white">⬛ ADICIONAR TARJA</button>
        
        <div id="extraTools" style="display:none; margin-top:10px; border-top:2px solid #ddd; padding-top:10px;">
            <button class="btn" onclick="removerItemSelecionado()" style="background:var(--danger); color:white; width:100%">🗑️ EXCLUIR ITEM SELECIONADO</button>
        </div>

        <button class="btn" onclick="removerCartaz()" style="background:none; border:1px solid red; color:red; margin-top:20px">EXCLUIR CARTAZ COMPLETO</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDWbWeGNAfhwcmRm31oS58oo0wUKFS1wVo",
        authDomain: "cartazista-web.firebaseapp.com",
        projectId: "cartazista-web",
        storageBucket: "cartazista-web.firebasestorage.app",
        messagingSenderId: "838926325456",
        appId: "1:838926325456:web:e7cc86c71410272878b0d5",
        measurementId: "G-9CMQF1N0NL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, "projeto", "sessao_atual");
    const modelosRef = doc(db, "projeto", "modelos_salvos");
    let modelosSalvos = [];

    let cartazes = [];
    let sel = null;
    let dragging = false;
    let offset = { x: 0, y: 0 };
    let historyStack = [];
    let redoStack = [];

    function saveToHistory() {
        historyStack.push(JSON.stringify(cartazes));
        if (historyStack.length > 30) historyStack.shift();
        redoStack = [];
    }

    window.undoAction = () => {
        if (historyStack.length < 1) return;
        redoStack.push(JSON.stringify(cartazes));
        cartazes = JSON.parse(historyStack.pop());
        render();
        salvarNoFirebase();
    };

    window.redoAction = () => {
        if (redoStack.length < 1) return;
        historyStack.push(JSON.stringify(cartazes));
        cartazes = JSON.parse(redoStack.pop());
        render();
        salvarNoFirebase();
    };

    async function salvarNoFirebase() {
        try {
            await setDoc(docRef, { 
                dados: cartazes, 
                layout: document.getElementById('selectLayout')?.value || "grid-4",
                timestamp: new Date()
            });
        } catch (e) {
            console.error("Erro ao salvar:", e);
        }
    }

    async function carregarDoFirebase() {
        try {
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                cartazes = docSnap.data().dados || [];
                const savedLayout = docSnap.data().layout || "grid-4";
                document.getElementById('selectLayout').value = savedLayout;
                mudarLayout(savedLayout);
            }
            if (cartazes.length === 0) {
                adicionarCartaz();
            }
            render();
        } catch (e) {
            console.error("Erro ao carregar:", e);
            adicionarCartaz();
        }
    }

    window.adicionarCartaz = () => {
        saveToHistory();
        const id = Date.now();
        cartazes.push({
            id: id,
            itens: [
                { id: 'h-'+id, tipo: 'head',  val: 'OFERTA IMPERDÍVEL', x: 60,  y: 25,  size: 48, font: "'Bebas Neue'", col: '#d63031', w:0, h:0, rot:0 },
                { id: 'd-'+id, tipo: 'desc',  val: 'PRODUTO EM DESTAQUE', x: 40,  y: 95,  size: 58, font: "'Bebas Neue'", col: '#000000', w:0, h:0, rot:0 },
                { id: 'm-'+id, tipo: 'marca', val: 'MARCA PREMIUM',     x: 60,  y: 165, size: 34, font: "'Bebas Neue'", col: '#1e272e', w:0, h:0, rot:0 },
                { id: 'w-'+id, tipo: 'peso',  val: '1 kg',              x: 60,  y: 210, size: 30, font: "'Bebas Neue'", col: '#d63031', w:0, h:0, rot:0 },
                { id: 'p-'+id, tipo: 'preco', val: '9,99',              x: 40,  y: 250, size: 145, font: "'Anton'",      col: '#000000', w:0, h:0, rot:0 }
            ]
        });
        render();
        salvarNoFirebase();
    };

    window.duplicarCartaz = () => {
        if (!sel) return alert("Selecione um cartaz primeiro.");
        saveToHistory();
        const clone = JSON.parse(JSON.stringify(sel.cartaz));
        clone.id = Date.now();
        clone.itens.forEach(it => it.id = it.id.split('-')[0] + '-' + clone.id);
        cartazes.push(clone);
        render();
        salvarNoFirebase();
    };

    window.removerCartaz = () => {
        if (!sel) return;
        saveToHistory();
        cartazes = cartazes.filter(c => c.id !== sel.cartaz.id);
        sel = null;
        document.getElementById('edPanel').style.display = 'none';
        render();
        salvarNoFirebase();
    };

    window.excluirCartazPorId = (cartazId) => {
        if (!confirm("Tem certeza que deseja excluir este cartaz?")) return;
        saveToHistory();
        cartazes = cartazes.filter(c => c.id !== cartazId);
        sel = null;
        document.getElementById('edPanel').style.display = 'none';
        render();
        salvarNoFirebase();
    };

    window.removerItemSelecionado = () => {
        if (!sel || !sel.data || !sel.cartaz) return;
        const tiposProtegidos = ['head', 'desc', 'marca', 'peso', 'preco'];
        if (tiposProtegidos.includes(sel.data.tipo)) {
            alert("Este item de texto é essencial. Você pode apenas mudar seu conteúdo ou ocultá-lo mudando a cor.");
            return;
        }
        saveToHistory();
        sel.cartaz.itens = sel.cartaz.itens.filter(i => i.id !== sel.data.id);
        desmarcarTudo();
        render();
        salvarNoFirebase();
    };

    window.mudarLayout = (v) => {
        document.getElementById('folha-impressao').className = v;
        render();
        salvarNoFirebase();
    };

    window.atualizarTextos = (tipo) => {
        if (!sel) return;
        saveToHistory();
        const alvo = sel.cartaz.itens.find(i => i.tipo === tipo);
        if (alvo) {
            alvo.val = document.getElementById('in' + tipo.charAt(0).toUpperCase() + tipo.slice(1)).value;
            render();
            salvarNoFirebase();
        }
    };

    window.atualizarEstilo = () => {
        if (!sel) return;
        saveToHistory();
        const data = sel.data;
        data.font = document.getElementById('inFont').value;
        data.size = parseInt(document.getElementById('inSize').value) || 50;
        data.col = document.getElementById('inColor').value;
        data.w = parseInt(document.getElementById('inW').value) || 0;
        data.h = parseInt(document.getElementById('inH').value) || 0;
        data.rot = parseFloat(document.getElementById('inRot').value) || 0;

        if (['head','desc','marca','peso','preco'].includes(data.tipo)) {
            data.shadow = document.getElementById('inShadow').checked;
            data.shadowCol = document.getElementById('inShadowColor').value;
        }

        render();
        salvarNoFirebase();
    };

    window.setCorRapida = (cor) => {
        if (!sel) return;
        document.getElementById('inColor').value = cor;
        atualizarEstilo();
    };

    window.centralizar = () => {
        if (!sel) return;
        saveToHistory();
        if (sel.el && sel.el.parentElement) {
            sel.data.x = (sel.el.parentElement.offsetWidth / 2) - (sel.el.offsetWidth / 2);
            render();
            salvarNoFirebase();
        }
    };

    // ==================== FUNÇÃO MELHORADA - ADICIONAR TARJA ====================
    window.adicionarTarja = () => {
        if (!sel) return alert("Selecione um cartaz primeiro.");
        saveToHistory();

        const tarjaId = 'bg-' + Date.now();
        const textoId = 'txt-' + Date.now();

        // Tarja (fundo amarelo)
        const tarja = {
            id: tarjaId,
            tipo: 'bg',
            val: '',
            x: 35,
            y: 170,
            size: 0,
            font: '',
            col: '#f1c40f',
            w: 470,
            h: 92,
            rot: 0
        };

        // Texto em cima da tarja
        const textoTarja = {
            id: textoId,
            tipo: 'custom',
            val: 'SUPERMERCADO PADRÃO',
            x: 45,
            y: 185,
            size: 45,
            font: "'Bebas Neue'",
            col: '#1e272e',
            w: 0,
            h: 0,
            rot: 0,
            shadow: true,
            shadowCol: '#ffffff'
        };

        // Adiciona tarja primeiro (fica atrás)
        sel.cartaz.itens.unshift(tarja);
        // Adiciona texto depois (fica por cima)
        sel.cartaz.itens.unshift(textoTarja);

        render();
        salvarNoFirebase();

        // Seleciona automaticamente o texto para edição
        setTimeout(() => {
            const textoEl = document.getElementById(textoId);
            if (textoEl) {
                sel = { 
                    data: textoTarja, 
                    el: textoEl, 
                    cartaz: sel.cartaz 
                };
                
                document.querySelectorAll('.item-movel').forEach(el => el.classList.remove('selecionado'));
                textoEl.classList.add('selecionado');
                
                mostrarNoPainel(textoTarja, sel.cartaz);
            }
        }, 120);
    };

    window.desmarcarTudo = () => {
        sel = null;
        document.querySelectorAll('.item-movel').forEach(i => i.classList.remove('selecionado'));
        document.getElementById('edPanel').style.display = 'none';
        document.getElementById('extraTools').style.display = 'none';
    };

    window.focarItem = (tipo) => {
        if (!sel) return;
        const item = sel.cartaz.itens.find(i => i.tipo === tipo);
        if (item) {
            sel.data = item;
            sel.el = document.getElementById(item.id);
            document.querySelectorAll('.item-movel').forEach(i => i.classList.remove('selecionado'));
            if (sel.el) sel.el.classList.add('selecionado');
            mostrarNoPainel(item, sel.cartaz);
        }
    };

    window.pararArrasto = () => { 
        if (dragging) {
            dragging = false; 
            saveToHistory();
            salvarNoFirebase();
        }
    };

    window.adicionarImagem = () => {
        if (!sel) return alert("Selecione um cartaz primeiro.");
        saveToHistory();
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.onchange = e => {
            const file = e.target.files?.[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const id = 'img-' + Date.now();
                sel.cartaz.itens.push({
                    id, tipo: 'img', val: ev.target.result,
                    x: 50, y: 50, w: 220, h: 180, rot: 0
                });
                render();
                salvarNoFirebase();
            };
            reader.readAsDataURL(file);
        };
        input.click();
    };

    window.adicionarQR = () => {
        if (!sel) return alert("Selecione um cartaz.");
        saveToHistory();
        const texto = prompt("Texto ou URL para o QR Code:", "https://exemplo.com");
        if (!texto) return;
        const id = 'qr-' + Date.now();
        sel.cartaz.itens.push({
            id, tipo: 'qr', val: texto,
            x: 180, y: 180, w: 140, h: 140, rot: 0
        });
        render();
        salvarNoFirebase();
    };

    window.carregarTemplate = (tipo) => {
        if (!tipo) return;
        saveToHistory();
        const id = Date.now();
        let t = {
            id: id,
            itens: [
                { id: 'h-'+id, tipo: 'head', val: 'OFERTA ESPECIAL', x: 60, y: 30, size: 50, font: "'Bebas Neue'", col: '#d63031', w:0, h:0, rot:0, shadow:true, shadowCol:'#000' },
                { id: 'd-'+id, tipo: 'desc', val: 'PRODUTO SELECIONADO', x: 40, y: 100, size: 42, font: "'Bebas Neue'", col: '#000', w:0, h:0, rot:0 },
                { id: 'm-'+id, tipo: 'marca', val: 'MARCA DE QUALIDADE', x: 60, y: 165, size: 34, font: "'Bebas Neue'", col: '#1e272e', w:0, h:0, rot:0 },
                { id: 'w-'+id, tipo: 'peso', val: '800 g', x: 60, y: 210, size: 30, font: "'Bebas Neue'", col: '#d63031', w:0, h:0, rot:0 },
                { id: 'p-'+id, tipo: 'preco', val: '7,49', x: 40, y: 255, size: 135, font: "'Anton'", col: '#000', w:0, h:0, rot:0 }
            ]
        };
        if (tipo === 'preco') t.itens[4].size = 170;
        if (tipo === 'marca') t.itens[2].size = 42;
        cartazes.push(t);
        render();
        salvarNoFirebase();
    };

    window.exportarPNG = () => {
        const layoutAtual = document.getElementById('selectLayout').value;
        const folhaCompleta = document.getElementById('folha-impressao');

        if (layoutAtual === "grid-1") {
            const areas = folhaCompleta.querySelectorAll('.cartaz-area');
            let contador = 1;
            areas.forEach(area => {
                html2canvas(area, { scale: 3, useCORS: true, backgroundColor: "#ffffff" }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `cartaz_${contador}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                    contador++;
                });
            });
        } else {
            html2canvas(folhaCompleta, { scale: 3, useCORS: true, backgroundColor: "#ffffff" }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'folha_cartazes.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    };

    window.exportarPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({orientation: 'portrait', unit: 'mm', format: 'a4'});
        html2canvas(document.getElementById('folha-impressao'), {scale: 2}).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const w = doc.internal.pageSize.getWidth();
            const h = doc.internal.pageSize.getHeight();
            doc.addImage(imgData, 'PNG', 0, 0, w, h);
            doc.save('cartaz.pdf');
        });
    };

    function mostrarNoPainel(it, c) {
        const panel = document.getElementById('edPanel');
        if (!panel) return;
        panel.style.display = 'flex';
        
        const extraTools = document.getElementById('extraTools');
        const tiposProtegidos = ['head', 'desc', 'marca', 'peso', 'preco'];
        extraTools.style.display = tiposProtegidos.includes(it.tipo) ? 'none' : 'block';

        document.getElementById('inHead').value  = c.itens.find(i => i.tipo === 'head')?.val  || '';
        document.getElementById('inDesc').value  = c.itens.find(i => i.tipo === 'desc')?.val  || '';
        document.getElementById('inMarca').value = c.itens.find(i => i.tipo === 'marca')?.val || '';
        document.getElementById('inPeso').value  = c.itens.find(i => i.tipo === 'peso')?.val  || '';
        document.getElementById('inPreco').value = c.itens.find(i => i.tipo === 'preco')?.val || '';

        document.getElementById('inFont').value = it.font || "'Bebas Neue'";
        document.getElementById('inSize').value = it.size || 40;
        document.getElementById('inColor').value = it.col || '#000000';
        document.getElementById('inW').value = it.w || 0;
        document.getElementById('inH').value = it.h || 0;
        document.getElementById('inRot').value = it.rot || 0;
        document.getElementById('inShadow').checked = !!it.shadow;
        document.getElementById('inShadowColor').value = it.shadowCol || '#000000';

        document.getElementById('controlesFundo').style.display = 
            (it.tipo === 'bg' || it.tipo === 'img' || it.tipo === 'qr') ? 'block' : 'none';

        document.getElementById('labelEdit').innerText = "EDITANDO: " + (it.tipo || "ITEM").toUpperCase();
    }

    function render() {
        const folha = document.getElementById('folha-impressao');
        if (!folha) return;
        folha.innerHTML = '';

        cartazes.forEach(c => {
            const area = document.createElement('div');
            area.className = 'cartaz-area';

            const btnExcluir = document.createElement('button');
            btnExcluir.className = 'cartaz-header';
            btnExcluir.innerHTML = '🗑️';
            btnExcluir.title = 'Excluir este cartaz';
            btnExcluir.onclick = (e) => {
                e.stopPropagation();
                excluirCartazPorId(c.id);
            };
            area.appendChild(btnExcluir);

            c.itens.forEach(it => {
                let el;
                if (it.tipo === 'img') {
                    el = document.createElement('img');
                    el.src = it.val || '';
                } else if (it.tipo === 'qr') {
                    el = document.createElement('div');
                } else {
                    el = document.createElement('div');
                }

                el.id = it.id;
                el.className = 'item-movel';
                
                if (it.tipo === 'bg') el.style.zIndex = "5";
                else if (it.tipo === 'img' || it.tipo === 'qr') el.style.zIndex = "10";
                else el.style.zIndex = "20";

                el.style.left = (it.x || 50) + 'px';
                el.style.top  = (it.y || 50) + 'px';
                el.style.transform = `rotate(${(it.rot || 0)}deg)`;
                el.style.color = it.col || '#000000';

                if (it.tipo === 'bg') {
                    el.classList.add('tarja-fundo');
                    el.style.backgroundColor = it.col || '#d63031';
                    el.style.width  = (it.w || 300) + 'px';
                    el.style.height = (it.h || 60) + 'px';
                } else if (it.tipo === 'img' || it.tipo === 'qr') {
                    el.style.width  = (it.w || 200) + 'px';
                    el.style.height = (it.h || 200) + 'px';
                } else {
                    el.style.fontSize   = (it.size || 40) + 'px';
                    el.style.fontFamily = it.font || "'Bebas Neue'";
                    el.style.textShadow = it.shadow ? `3px 3px 8px ${it.shadowCol || '#000'}` : 'none';
                    el.style.minWidth   = '120px';
                    el.style.minHeight  = '30px';

                    if (it.tipo === 'preco') {
                        const v = (it.val || '0,00').replace(',', '.').split('.');
                        el.innerHTML = `<small style="font-size:0.38em">R$</small>${v[0]}<small style="font-size:0.58em; border-bottom:7px solid currentColor">,${v[1]||'00'}</small>`;
                    } else {
                        el.textContent = it.val || it.tipo.toUpperCase();
                    }
                }

                el.ondblclick = () => {
                    if (it.tipo === 'bg') return;
                    if (it.tipo === 'qr') {
                        const txt = prompt("Novo conteúdo do QR Code:", it.val);
                        if (txt) { it.val = txt; render(); salvarNoFirebase(); saveToHistory(); }
                        return;
                    }
                    if (it.tipo === 'img') {
                        const inp = document.createElement('input');
                        inp.type = 'file';
                        inp.accept = 'image/*';
                        inp.onchange = e => {
                            const f = e.target.files?.[0];
                            if (!f) return;
                            const r = new FileReader();
                            r.onload = ev => { it.val = ev.target.result; render(); salvarNoFirebase(); saveToHistory(); };
                            r.readAsDataURL(f);
                        };
                        inp.click();
                        return;
                    }
                    const novo = prompt("Novo texto:", it.val);
                    if (novo !== null) {
                        it.val = novo.toUpperCase();
                        render();
                        salvarNoFirebase();
                        saveToHistory();
                    }
                };

                el.onmousedown = e => {
                    e.stopPropagation();
                    sel = { data: it, el, cartaz: c };
                    dragging = true;
                    document.querySelectorAll('.item-movel').forEach(el => el.classList.remove('selecionado'));
                    el.classList.add('selecionado');
                    offset.x = e.clientX - el.offsetLeft;
                    offset.y = e.clientY - el.offsetTop;
                    mostrarNoPainel(it, c);
                };

                area.appendChild(el);

                if (it.tipo === 'qr') {
                    setTimeout(() => {
                        const container = document.getElementById(it.id);
                        if (container && !container.hasChildNodes()) {
                            try {
                                new QRCode(container, {
                                    text: it.val || 'https://example.com',
                                    width: it.w || 140,
                                    height: it.h || 140,
                                    colorDark: "#000000",
                                    colorLight: "#ffffff"
                                });
                            } catch(e) {
                                console.warn("Erro ao gerar QR", e);
                            }
                        }
                    }, 80);
                }
            });

            folha.appendChild(area);
        });
    }

    document.onmousemove = e => {
        if (!dragging || !sel) return;
        sel.data.x = e.clientX - offset.x;
        sel.data.y = e.clientY - offset.y;
        sel.el.style.left = sel.data.x + 'px';
        sel.el.style.top  = sel.data.y + 'px';
    };

    // ==================== MODELOS SALVOS - LIXEIRA SEPARADA ====================

    async function carregarModelosDoFirebase() {
        try {
            const docSnap = await getDoc(modelosRef);
            if (docSnap.exists()) {
                modelosSalvos = docSnap.data().modelos || [];
                atualizarSelectModelos();
            }
        } catch (e) {
            console.error("Erro ao carregar modelos:", e);
        }
    }

    function atualizarSelectModelos() {
        const select = document.getElementById('selectModelosSalvos');
        if (!select) return;

        select.innerHTML = '<option value="">📂 MODELOS SALVOS</option>';

        modelosSalvos.forEach((m, index) => {
            const loadOpt = document.createElement('option');
            loadOpt.value = `load_${index}`;
            loadOpt.textContent = `${m.nome} (${new Date(m.timestamp).toLocaleDateString('pt-BR')})`;
            select.appendChild(loadOpt);

            const deleteOpt = document.createElement('option');
            deleteOpt.value = `delete_${index}`;
            deleteOpt.textContent = `   🗑️ Excluir`;
            deleteOpt.style.color = "#d63031";
            select.appendChild(deleteOpt);
        });
    }

    window.handleModeloSelect = (selectElement) => {
        const valor = selectElement.value;
        if (!valor) return;

        if (valor.startsWith("load_")) {
            const index = parseInt(valor.replace("load_", ""));
            carregarModeloSalvo(index.toString());
            selectElement.value = "";
            return;
        }

        if (valor.startsWith("delete_")) {
            const index = parseInt(valor.replace("delete_", ""));
            const nome = modelosSalvos[index].nome;

            if (confirm(`Tem certeza que deseja excluir o modelo "${nome}"?\n\nEsta ação não pode ser desfeita.`)) {
                excluirModeloSalvo(index);
            }
            selectElement.value = "";
            return;
        }
    };

    window.excluirModeloSalvo = async (index) => {
        if (index < 0 || index >= modelosSalvos.length) return;

        const nome = modelosSalvos[index].nome;
        saveToHistory();
        modelosSalvos.splice(index, 1);

        try {
            await setDoc(modelosRef, { modelos: modelosSalvos });
            atualizarSelectModelos();
            alert(`✅ Modelo "${nome}" excluído com sucesso!`);
        } catch (e) {
            console.error("Erro ao excluir modelo:", e);
            alert("Erro ao excluir o modelo. Verifique sua conexão.");
        }
    };

    window.salvarModeloAtual = async () => {
        const nome = prompt("Digite o nome do modelo/rascunho para salvar:", "Rascunho " + new Date().toLocaleDateString('pt-BR'));
        if (!nome || nome.trim() === '') return;
        const layoutAtual = document.getElementById('selectLayout').value || "grid-4";
        const novoModelo = {
            nome: nome.trim(),
            layout: layoutAtual,
            dados: JSON.parse(JSON.stringify(cartazes)),
            timestamp: Date.now()
        };
        modelosSalvos.unshift(novoModelo);
        if (modelosSalvos.length > 30) modelosSalvos.pop();
        try {
            await setDoc(modelosRef, { modelos: modelosSalvos });
            atualizarSelectModelos();
            alert("✅ Modelo salvo com sucesso como rascunho!");
        } catch (e) {
            console.error("Erro ao salvar modelo no Firebase:", e);
            alert("Erro ao salvar. Verifique sua conexão.");
        }
    };

    window.carregarModeloSalvo = (valor) => {
        if (valor === "" || valor === null) return;
        const index = parseInt(valor);
        const modelo = modelosSalvos[index];
        if (!modelo) return alert("Modelo não encontrado.");
        if (confirm(`Carregar o modelo "${modelo.nome}"? Isso substituirá o cartaz atual.`)) {
            saveToHistory();
            cartazes = JSON.parse(JSON.stringify(modelo.dados));
            const selLayout = document.getElementById('selectLayout');
            if (selLayout) selLayout.value = modelo.layout || "grid-4";
            mudarLayout(modelo.layout || "grid-4");
            render();
            salvarNoFirebase();
            atualizarSelectModelos();
            alert(`Modelo "${modelo.nome}" carregado com sucesso! (exatamente como salvo)`);
        }
    };

    window.onload = () => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => { splash.style.display = 'none'; }, 1600);
            }, 6500);

            setTimeout(() => {
                if (splash.style.opacity !== '0') {
                    splash.style.display = 'none';
                }
            }, 15000);
        }

        carregarDoFirebase();
        carregarModelosDoFirebase();
    };
</script>
