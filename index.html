<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartazista Pro 17.1 - Multilinha Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Anton&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #0984e3; --danger: #d63031; --sucesso: #00b894; --dark: #1e272e; }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        body { font-family: 'Segoe UI', sans-serif; background: #4b6584; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .toolbar { background: var(--dark); padding: 10px 20px; display: flex; gap: 15px; align-items: center; color: white; z-index: 2000; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: 900; font-size: 11px; text-transform: uppercase; }
        .btn-add { background: var(--sucesso); color: white; }
        .btn-print { background: var(--danger); color: white; }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        .workspace { flex: 1; overflow: auto; padding: 40px; background: #2f3542; display: flex; justify-content: center; }
        
        #folha-impressao { width: 210mm; background: white; display: grid; min-height: 297mm; position: relative; }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 148.5mm 148.5mm; }

        .cartaz-area { position: relative; overflow: hidden; background: #fff; border: 0.1mm solid #eee; }
        
        /* ELEMENTOS */
        .item-movel { position: absolute; cursor: move; user-select: none; line-height: 0.95; z-index: 10; padding: 0; background: transparent; white-space: pre-wrap; word-wrap: break-word; }
        .tarja-fundo { z-index: 5 !important; }
        .selecionado { outline: 2px dashed var(--azul) !important; z-index: 100 !important; }

        /* EDITOR */
        .editor-panel { width: 380px; background: #f1f2f6; padding: 20px; border-left: 1px solid #ccc; display: none; flex-direction: column; gap: 15px; overflow-y: auto; }
        .secao { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .campo { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        label { font-size: 10px; font-weight: 800; color: #57606f; text-transform: uppercase; }
        
        textarea { padding: 10px; border: 2px solid #bdc3c7; border-radius: 4px; font-size: 14px; min-height: 80px; font-family: 'Segoe UI', sans-serif; }
        input[type="number"], select { padding: 8px; border: 1px solid #bdc3c7; border-radius: 4px; }
        input[type="range"] { cursor: pointer; }

        @media print { .toolbar, .editor-panel { display: none !important; } .cartaz-area { border: none !important; } }
    </style>
</head>
<body>

<div class="toolbar">
    <div style="font-weight: 900; letter-spacing: 1px;">CARTAZISTA <span style="color:var(--sucesso)">ULTRA</span></div>
    <select onchange="mudarLayout(this.value)" style="padding:5px;">
        <option value="grid-4">4 por Folha</option>
        <option value="grid-1">1 por Folha (A4)</option>
    </select>
    <button class="btn btn-add" onclick="adicionarCartaz()">✚ NOVO CARTAZ</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ IMPRIMIR</button>
</div>

<div class="main-container">
    <div class="workspace">
        <div id="folha-impressao" class="grid-4"></div>
    </div>

    <div class="editor-panel" id="edPanel">
        <h3 id="tituloEditor" style="margin:0; color: var(--dark)">Editar Item</h3>

        <div class="secao">
            <div class="campo" id="boxTexto">
                <label>Texto do Item (Use ENTER para quebrar linha)</label>
                <textarea id="inText" oninput="atualizar()"></textarea>
            </div>

            <div class="campo"><label>Fonte</label>
                <select id="inFont" onchange="atualizar()">
                    <option value="'Bebas Neue'">Bebas Neue (Ideal p/ Títulos)</option>
                    <option value="'Anton'">Anton (Forte)</option>
                    <option value="'Archivo Black'">Archivo Black (Pesada)</option>
                    <option value="'Oswald'">Oswald (Moderna)</option>
                </select>
            </div>

            <div style="display:flex; gap:10px">
                <div class="campo" style="flex:1"><label>Tamanho</label><input type="range" id="inSize" min="5" max="800" oninput="atualizar()"></div>
                <div class="campo"><label>Cor</label><input type="color" id="inColor" onchange="atualizar()"></div>
            </div>

            <div id="controlesFundo" style="display:none; border-top:2px solid #f1f2f6; padding-top:10px; margin-top:10px">
                <label style="color:var(--danger)">Medidas da Tarja (Fundo)</label>
                <div style="display:flex; gap:10px">
                    <div class="campo"><label>Largura (px)</label><input type="number" id="inW" style="width:80px" oninput="atualizar()"></div>
                    <div class="campo"><label>Altura (px)</label><input type="number" id="inH" style="width:80px" oninput="atualizar()"></div>
                </div>
            </div>
            
            <button class="btn" onclick="centralizar()" style="background:var(--azul); color:white; width:100%; margin-top:10px">↔ CENTRALIZAR NO QUADRO</button>
        </div>
        
        <button class="btn" onclick="adicionarTarja()" style="background:#ffa502; color:white; margin-top:5px">⬛ ADICIONAR TARJA DE FUNDO</button>
        <button class="btn" onclick="removerCartaz()" style="background:none; border:1px solid red; color:red; margin-top:20px">EXCLUIR CARTAZ</button>
    </div>
</div>

<script>
    let cartazes = [];
    let sel = null;
    let dragging = false;
    let offset = { x: 0, y: 0 };

    function adicionarCartaz() {
        const id = Date.now();
        cartazes.push({
            id: id,
            itens: [
                { id: 'h-'+id, tipo: 'txt', val: 'OFERTA', x: 20, y: 15, size: 40, font: "'Bebas Neue'", col: '#d63031', w:0, h:0 },
                { id: 'd-'+id, tipo: 'txt', val: 'NOME DO\nPRODUTO', x: 20, y: 70, size: 55, font: "'Bebas Neue'", col: '#000000', w:0, h:0 },
                { id: 'p-'+id, tipo: 'preco', val: '19,90', x: 60, y: 180, size: 150, font: "'Anton'", col: '#000000', w:0, h:0 }
            ]
        });
        render();
    }

    function adicionarTarja() {
        if(!sel) return;
        const id = 'bg-' + Date.now();
        sel.cartaz.itens.unshift({ id: id, tipo: 'bg', val: '', x: 10, y: 10, size: 0, font: '', col: '#d63031', w: 300, h: 60 });
        render();
    }

    function render() {
        const folha = document.getElementById('folha-impressao');
        folha.innerHTML = '';

        cartazes.forEach(c => {
            const area = document.createElement('div');
            area.className = 'cartaz-area';
            
            c.itens.forEach(it => {
                const el = document.createElement('div');
                el.id = it.id;
                el.className = 'item-movel' + (it.tipo === 'bg' ? ' tarja-fundo' : '');
                el.style.left = it.x + 'px';
                el.style.top = it.y + 'px';
                el.style.color = it.col;

                if(it.tipo === 'bg') {
                    el.style.backgroundColor = it.col;
                    el.style.width = it.w + 'px';
                    el.style.height = it.h + 'px';
                } else {
                    el.style.fontSize = it.size + 'px';
                    el.style.fontFamily = it.font;
                    if(it.tipo === 'preco') {
                        const p = it.val.replace(',', '.').split('.');
                        el.innerHTML = `<small style="font-size:0.35em">R$</small>${p[0]}<small style="font-size:0.5em; border-bottom:6px solid">,${p[1]||'00'}</small>`;
                    } else {
                        el.innerText = it.val;
                    }
                }

                el.onmousedown = (e) => {
                    sel = { data: it, el: el, cartaz: c };
                    dragging = true;
                    document.querySelectorAll('.item-movel').forEach(i => i.classList.remove('selecionado'));
                    el.classList.add('selecionado');
                    offset.x = e.clientX - el.offsetLeft;
                    offset.y = e.clientY - el.offsetTop;

                    document.getElementById('edPanel').style.display = 'flex';
                    document.getElementById('tituloEditor').innerText = 'Editando: ' + it.tipo.toUpperCase();
                    document.getElementById('inText').value = it.val;
                    document.getElementById('inFont').value = it.font;
                    document.getElementById('inSize').value = it.size;
                    document.getElementById('inColor').value = it.col;
                    document.getElementById('inW').value = it.w;
                    document.getElementById('inH').value = it.h;
                    
                    document.getElementById('boxTexto').style.display = it.tipo === 'bg' ? 'none' : 'flex';
                    document.getElementById('controlesFundo').style.display = it.tipo === 'bg' ? 'block' : 'none';
                };
                area.appendChild(el);
            });
            folha.appendChild(area);
        });
    }

    function atualizar() {
        if(!sel) return;
        sel.data.val = document.getElementById('inText').value;
        sel.data.font = document.getElementById('inFont').value;
        sel.data.size = document.getElementById('inSize').value;
        sel.data.col = document.getElementById('inColor').value;
        sel.data.w = document.getElementById('inW').value;
        sel.data.h = document.getElementById('inH').value;
        render();
        document.getElementById(sel.data.id).classList.add('selecionado');
    }

    function centralizar() {
        if(!sel) return;
        const el = document.getElementById(sel.data.id);
        sel.data.x = (el.parentElement.offsetWidth / 2) - (el.offsetWidth / 2);
        render();
        document.getElementById(sel.data.id).classList.add('selecionado');
    }

    function mudarLayout(v) { document.getElementById('folha-impressao').className = v; }
    function removerCartaz() { if(sel) { cartazes = cartazes.filter(c => c.id !== sel.cartaz.id); sel = null; render(); } }

    document.onmousemove = (e) => {
        if(!dragging || !sel) return;
        sel.data.x = e.clientX - offset.x;
        sel.data.y = e.clientY - offset.y;
        sel.el.style.left = sel.data.x + 'px';
        sel.el.style.top = sel.data.y + 'px';
    };
    document.onmouseup = () => dragging = false;

    adicionarCartaz();
</script>
</body>
</html>
