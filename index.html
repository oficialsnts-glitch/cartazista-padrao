<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartazista Pro - Foco em Marca</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e61e25">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');

        :root {
            --vermelho: #e61e25; --verde: #009432; --laranja: #f39c12; 
            --amarelo: #ffc312; --preto: #1e272e; --azul: #0984e3;
            --roxo-validade: #6c5ce7;
            --f-topo: 2.8em; --f-prod: 1.1em; /* Produto menor */
            --f-reais: 14em;
        }

        * { box-sizing: border-box; }

        body { font-family: 'Archivo Black', sans-serif; background-color: #cbd5e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Interface */
        .painel { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 30px; width: 100%; max-width: 750px; border-top: 5px solid var(--vermelho); }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 12px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 10px; text-transform: uppercase; color: #718096; margin-bottom: 4px; font-weight: bold; }
        input, select { padding: 10px; border: 2px solid #edf2f7; border-radius: 8px; font-size: 14px; }
        #group-validade { display: none; }
        .botoes { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-add { background: var(--preto); color: white; }
        .btn-print { background: var(--vermelho); color: white; }
        .btn-clear { background: #718096; color: white; flex: 0.3; }

        /* Área de Impressão */
        #container-impressao { width: 210mm; margin: 0 auto; background: #fff; display: grid; }
        
        .layout-1 { grid-template-columns: 1fr; padding: 0; }
        .layout-1 .cartaz-item { height: 290mm; --f-topo: 4.5em; --f-prod: 1.8em; --f-reais: 24em; }

        .layout-2 { grid-template-columns: 1fr; row-gap: 5mm; padding: 5mm; }
        .layout-2 .cartaz-item { height: 138mm; }

        .layout-4 { grid-template-columns: 1fr 1fr; gap: 2mm; padding: 2mm; }
        .layout-4 .cartaz-item { height: 140mm; --f-topo: 1.6em; --f-prod: 0.9em; --f-reais: 9em; padding: 0 5px 15px 5px !important; }

        .cartaz-item { 
            width: 100%; background: #fff; display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; position: relative; page-break-inside: avoid; 
            overflow: hidden; border: 1px dashed #ddd; padding: 0 5px 20px 5px;
        }

        .selo-topo { width: 115%; padding: 12px 0; text-align: center; transform: rotate(-1.5deg); z-index: 1; margin-top: -5px; }
        .selo-topo span { font-size: var(--f-topo); color: #fff; text-transform: uppercase; display: block; }

        /* Temas */
        .tema-oferta { background: var(--vermelho); }
        .tema-horti { background: var(--verde); }
        .tema-bebidas { background: var(--azul); }
        .tema-queima { background: var(--laranja); }
        .tema-ultimas { background: var(--amarelo); }
        .tema-ultimas span { color: var(--preto); }
        .tema-validade { background: #1a237e; }

        .info-produto { text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; width: 100%; padding: 0 15px; }
        
        /* FOCO NA MARCA */
        .nome-produto { font-size: var(--f-prod); color: #718096; margin: 0 0 5px 0; text-transform: uppercase; font-weight: normal; }
        .marca-produto { 
            width: 100%; 
            text-transform: uppercase; 
            line-height: 0.85; 
            letter-spacing: -2px; 
            margin: 0; 
            white-space: nowrap; 
            display: block;
            font-weight: 900;
            color: #000;
        }

        .gramatura-produto { font-size: 1.2em; color: #1e272e; font-weight: bold; margin-top: 5px; }
        .selo-validade-info { background: var(--roxo-validade); color: white; padding: 4px 12px; border-radius: 50px; font-size: 0.8em; margin-top: 8px; display: inline-block; align-self: center; }

        /* Preço */
        .preco-box { display: flex; align-items: flex-start; justify-content: center; width: 100%; margin-top: auto; }
        .rs { font-size: calc(var(--f-reais) * 0.15); margin-top: 12%; margin-right: 4px; color: #1e272e; }
        .reais { font-size: var(--f-reais); line-height: 0.75; color: var(--vermelho); letter-spacing: -8px; }
        
        .tema-horti ~ .preco-box .reais, .tema-horti ~ .preco-box .centavos { color: var(--verde); }
        .tema-bebidas ~ .preco-box .reais, .tema-bebidas ~ .preco-box .centavos { color: var(--azul); }
        .tema-validade ~ .preco-box .reais, .tema-validade ~ .preco-box .centavos { color: var(--roxo-validade); }

        .dir-box { display: flex; flex-direction: column; margin-top: 6%; }
        .centavos { font-size: calc(var(--f-reais) * 0.35); line-height: 1; color: var(--vermelho); border-bottom: 6px solid; }
        .unidade { font-size: calc(var(--f-reais) * 0.08); font-weight: 900; text-transform: uppercase; color: #1e272e; }

        .acoes-cartaz { position: absolute; top: 5px; right: 5px; display: flex; gap: 4px; z-index: 10; }
        .btn-acao { background: white; border: 1px solid #ccc; width: 28px; height: 28px; cursor: pointer; border-radius: 4px; font-size: 12px; }

        @media print {
            body { padding: 0; background: #fff; }
            .painel, .acoes-cartaz { display: none !important; }
            #container-impressao { width: 100%; border: none; }
        }
    </style>
</head>
<body>

    <div class="painel">
        <h2 style="text-align:center; margin-top:0;">🛒 Cartazista Pro v5.9</h2>
        <div class="grid-inputs">
            <div class="input-group">
                <label>Tema</label>
                <select id="selTema" onchange="toggleValidade()">
                    <option value="tema-oferta">OFERTA</option>
                    <option value="tema-validade">VALIDADE PRÓXIMA</option>
                    <option value="tema-horti">HORTIFRUTI</option>
                    <option value="tema-bebidas">BEBIDAS</option>
                    <option value="tema-queima">QUEIMA TOTAL</option>
                    <option value="tema-ultimas">SÓ HOJE</option>
                </select>
            </div>
            <div class="input-group" id="group-validade">
                <label>Vencimento</label>
                <input type="text" id="inVenc" placeholder="Ex: 16.02">
            </div>
            <div class="input-group">
                <label>Layout</label>
                <select id="selLayout" onchange="document.getElementById('container-impressao').className = this.value; renderizar();">
                    <option value="layout-2">2 por Folha</option>
                    <option value="layout-1">1 por Folha (A4)</option>
                    <option value="layout-4">4 por Folha</option>
                </select>
            </div>
        </div>
        <div class="grid-inputs">
            <div class="input-group"><label>Produto (Menor)</label><input type="text" id="inProd" placeholder="Ex: Arroz"></div>
            <div class="input-group"><label>Marca (DESTAQUE)</label><input type="text" id="inMarca" placeholder="Ex: TIO JOÃO"></div>
            <div class="input-group"><label>Peso</label><input type="text" id="inGram" placeholder="Ex: 5kg"></div>
        </div>
        <div class="grid-inputs">
            <div class="input-group"><label>Reais</label><input type="number" id="inR"></div>
            <div class="input-group"><label>Centavos</label><input type="number" id="inC"></div>
            <div class="input-group"><label>Unid.</label><input type="text" id="inU" placeholder="UN/KG"></div>
        </div>
        <div class="botoes">
            <button class="btn-add" onclick="adicionar()">➕ Adicionar</button>
            <button class="btn-print" onclick="window.print()">🖨️ Imprimir</button>
            <button class="btn-clear" onclick="limparTudo()">🗑️ Limpar</button>
        </div>
    </div>

    <div id="container-impressao" class="layout-2"></div>

    <script>
        let cartazes = JSON.parse(localStorage.getItem('meus_cartazes')) || [];

        window.onload = () => { renderizar(); };

        function toggleValidade() {
            const tema = document.getElementById('selTema').value;
            document.getElementById('group-validade').style.display = (tema === 'tema-validade') ? 'flex' : 'none';
        }

        function adicionar() {
            if(!document.getElementById('inMarca').value || !document.getElementById('inR').value) return alert("Preencha Marca e Valor!");
            const item = {
                id: Date.now(),
                tema: document.getElementById('selTema').value,
                temaTexto: document.getElementById('selTema').options[document.getElementById('selTema').selectedIndex].text,
                vencimento: document.getElementById('inVenc').value,
                prod: document.getElementById('inProd').value,
                marca: document.getElementById('inMarca').value,
                gram: document.getElementById('inGram').value,
                r: document.getElementById('inR').value,
                c: document.getElementById('inC').value,
                u: document.getElementById('inU').value,
                layout: document.getElementById('selLayout').value
            };
            cartazes.push(item);
            salvarERenderizar();
            limparInputs();
        }

        function duplicar(id) {
            const original = cartazes.find(c => c.id === id);
            if (original) { cartazes.push({ ...original, id: Date.now() }); salvarERenderizar(); }
        }

        function remover(id) {
            cartazes = cartazes.filter(c => c.id !== id);
            salvarERenderizar();
        }

        function salvarERenderizar() {
            localStorage.setItem('meus_cartazes', JSON.stringify(cartazes));
            renderizar();
        }

        function limparTudo() { if(confirm("Limpar tudo?")) { cartazes = []; salvarERenderizar(); } }

        function renderizar() {
            const container = document.getElementById('container-impressao');
            const layoutAtual = document.getElementById('selLayout').value;
            container.innerHTML = "";
            cartazes.forEach(c => {
                const centavos = c.c ? c.c.toString().padStart(2, '0') : "00";
                const validadeHtml = c.vencimento ? `<div class="selo-validade-info">VÁLIDO ATÉ: ${c.vencimento}</div>` : "";
                
                container.innerHTML += `
                    <div class="cartaz-item">
                        <div class="acoes-cartaz">
                            <button class="btn-acao" onclick="duplicar(${c.id})">👯</button>
                            <button class="btn-acao" style="color:red" onclick="remover(${c.id})">✕</button>
                        </div>
                        <div class="selo-topo ${c.tema}"><span>${c.temaTexto}</span></div>
                        <div class="info-produto">
                            <p class="nome-produto">${c.prod}</p>
                            <span class="marca-produto" id="m-${c.id}">${c.marca}</span>
                            <div class="gramatura-produto">${c.gram}</div>
                            ${validadeHtml}
                        </div>
                        <div class="preco-box">
                            <span class="rs">R$</span><span class="reais">${c.r || 0}</span>
                            <div class="dir-box"><span class="centavos">${centavos}</span><span class="unidade">${c.u}</span></div>
                        </div>
                    </div>
                `;
                ajustarFonte(c.id, layoutAtual, c.marca);
            });
        }

        function ajustarFonte(id, layout, texto) {
            setTimeout(() => {
                const el = document.getElementById(`m-${id}`);
                const parent = el.parentElement;
                if (!el || !parent) return;
                
                // Base de fonte maior para a marca
                let fontSize = (layout === 'layout-1') ? 14 : (layout === 'layout-4' ? 4.2 : 7.8);
                el.style.fontSize = fontSize + "em";

                let maxWidth = parent.offsetWidth * 0.95;
                // Diminuir até caber
                while (el.offsetWidth > maxWidth && fontSize > 1) {
                    fontSize -= 0.1;
                    el.style.fontSize = fontSize + "em";
                }
            }, 0);
        }

        function limparInputs() {
            ["inProd", "inMarca", "inGram", "inR", "inC", "inVenc"].forEach(id => document.getElementById(id).value = "");
            document.getElementById('inMarca').focus();
        }
    </script>
</body>
</html>
