<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartazista Pro 21.0 - THODY & GEMINI + GROK</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Anton&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <!-- Inclua html2canvas para exportação PNG -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --azul: #0984e3;
            --danger: #d63031;
            --sucesso: #00b894;
            --dark: #1e272e;
            --warning: #f1c40f;
            --roxo: #8e44ad;
        }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        body { font-family: 'Segoe UI', sans-serif; background: #4b6584; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Splash */
        #splash-screen {
            position: fixed; inset: 0; background: var(--dark); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 1.6s ease, visibility 1.6s;
        }
        .welcome-text { font-family: 'Archivo Black', sans-serif; font-size: clamp(2.5rem, 8vw, 5.5rem); animation: zoomIn 2.8s ease-out; }
        .welcome-subtext { font-size: 1.4rem; color: var(--warning); margin: 1rem 0; letter-spacing: 5px; opacity: 0; animation: fadeIn 3.5s forwards 1.2s; }
        .names { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; border-top: 2px solid var(--warning); padding-top: 0.6rem; }
        .gemini { color: var(--azul); }

        @keyframes zoomIn { from { transform: scale(0.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { to { opacity: 1; } }

        .toolbar {
            background: var(--dark); color: white; padding: 0.8rem 1.5rem;
            display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; z-index: 2000;
        }
        .btn {
            padding: 0.5rem 1rem; border: none; border-radius: 5px; cursor: pointer;
            font-weight: bold; font-size: 0.9rem; text-transform: uppercase; white-space: nowrap;
        }
        .btn-add    { background: var(--sucesso); color: white; }
        .btn-duplica{ background: var(--azul); color: white; }
        .btn-print  { background: var(--danger); color: white; }
        .btn-export { background: #27ae60; color: white; }
        .btn-undo   { background: var(--warning); color: #2d3436; }
        .btn-redo   { background: #e67e22; color: white; }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        .workspace { flex: 1; overflow: auto; padding: 2rem; background: #2f3542; display: flex; justify-content: center; align-items: flex-start; }
        #folha-impressao { width: 210mm; min-height: 297mm; background: white; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.4); }

        .cartaz-area {
            position: relative; overflow: hidden; background: white;
            height: 148.5mm; border: 1px dashed #aaa;
        }
        .grid-1 .cartaz-area { height: 297mm; border: 2px dashed #000; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 148.5mm; }

        .item-movel {
            position: absolute; cursor: move; user-select: none;
            line-height: 1; text-align: center; white-space: pre-wrap;
            min-width: 20px; min-height: 20px; padding: 4px;
        }
        .resize-handle {
            position: absolute; width: 12px; height: 12px; background: var(--azul);
            border-radius: 50%; cursor: nwse-resize; z-index: 20; right: -6px; bottom: -6px;
        }
        .tarja-fundo { background: currentColor; color: white; }
        .qr-code { font-size: 0.8rem; opacity: 0.9; }

        .selecionado { outline: 3px solid var(--azul); background: rgba(9,132,227,0.08); z-index: 999; }

        .editor-panel {
            width: 440px; background: #f8f9fa; padding: 1rem; border-left: 1px solid #ccc;
            overflow-y: auto; display: none; flex-direction: column; gap: 1rem;
        }
        .secao { background: white; border: 1px solid #ddd; padding: 1rem; border-radius: 8px; }
        label { font-size: 0.75rem; font-weight: 800; color: #555; text-transform: uppercase; display: block; margin-bottom: 0.3rem; }
        input, select, textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }

        .color-palette { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin: 0.8rem 0; }
        .color-box { height: 28px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; transition: 0.15s; }
        .color-box:hover { transform: scale(1.15); box-shadow: 0 0 0 3px rgba(0,0,0,0.2); }

        @media print {
            @page { size: A4 portrait; margin: 0; }
            body, #splash-screen, .toolbar, .editor-panel { display: none !important; }
            .main-container, .workspace { padding: 0; overflow: visible; background: white; }
            #folha-impressao { box-shadow: none; width: 210mm !important; margin: 0 auto; }
            .cartaz-area { page-break-after: always; border: none !important; height: 297mm !important; }
            .grid-4 .cartaz-area { height: 297mm !important; page-break-after: always; }
        }
    </style>
</head>
<body onmouseup="pararArrasto()" onmouseleave="pararArrasto()">

<div id="splash-screen">
    <div class="welcome-text">CARTAZISTA PRO <span style="color:var(--warning)">21.0</span></div>
    <div class="welcome-subtext">O MAIS COMPLETO DO BRASIL</div>
    <div class="names">THODY & <span class="gemini">GEMINI</span> + GROK</div>
</div>

<div class="toolbar">
    <strong style="font-size:1.1rem;">CARTAZISTA PRO 21.0</strong>
    
    <select id="selectLayout" onchange="mudarLayout(this.value)">
        <option value="grid-4">4 por folha</option>
        <option value="grid-2">2 por folha</option>
        <option value="grid-1">1 por folha (A4 full)</option>
    </select>

    <select id="selectTemplate" onchange="carregarTemplate(this.value)">
        <option value="">— Templates —</option>
        <option value="oferta">Oferta Relâmpago</option>
        <option value="kit">Kit Economia</option>
        <option value="acougue">Açougue / Frios</option>
        <option value="limpeza">Produtos de Limpeza</option>
    </select>

    <button class="btn btn-add" onclick="adicionarCartaz()">+ NOVO CARTAZ</button>
    <button class="btn btn-duplica" onclick="duplicarCartaz()">📄 DUPLICAR</button>
    <button class="btn" onclick="adicionarImagem()" style="background:#e67e22;color:white">🖼 IMAGEM</button>
    <button class="btn" onclick="adicionarQR()" style="background:var(--roxo);color:white">🔲 QR CODE</button>
    <button class="btn btn-print" onclick="window.print()">🖨 IMPRIMIR</button>
    <button class="btn btn-export" onclick="exportarPNG()">📸 EXPORTAR PNG</button>
    <button class="btn btn-undo" onclick="desfazer()">↩ UNDO</button>
    <button class="btn btn-redo" onclick="refazer()">↪ REDO</button>
    <button class="btn" onclick="limparTudo()" style="background:var(--danger)">🗑 LIMPAR TUDO</button>

    <label style="color:white; font-size:0.85rem; display:flex; align-items:center; gap:6px; margin-left:auto;">
        <input type="checkbox" id="snapCheck" checked> Snap
        <select id="snapSize" style="font-size:0.8rem;padding:3px;">
            <option value="5">5px</option>
            <option value="10" selected>10px</option>
        </select>
    </label>
</div>

<div class="main-container">
    <div class="workspace">
        <div id="folha-impressao" class="grid-4"></div>
    </div>

    <div class="editor-panel" id="edPanel">
        <button class="btn" onclick="desmarcarTudo()" style="background:var(--danger);color:white;width:100%;">✖ FECHAR / LIMPAR SELEÇÃO</button>

        <div class="secao" id="secaoConteudo">
            <h4>CONTEÚDO PRINCIPAL</h4>
            <div class="campo"><label>Chamada / Título</label><textarea id="inHead" rows="2" oninput="atualizar('head')"></textarea></div>
            <div class="campo"><label>Produto / Descrição</label><textarea id="inDesc" rows="3" oninput="atualizar('desc')"></textarea></div>
            <div class="campo"><label>Marca / Fornecedor</label><textarea id="inMarca" rows="1" oninput="atualizar('marca')"></textarea></div>
            <div class="campo"><label>Peso / Embalagem</label><input type="text" id="inPeso" oninput="atualizar('peso')"></div>
            <div class="campo"><label>Preço (use ,)</label><input type="text" id="inPreco" oninput="atualizar('preco')"></div>
            <div class="campo"><label>Link / QR Code (opcional)</label><input type="text" id="inQR" placeholder="https://..." oninput="atualizarQR()"></div>
        </div>

        <div class="secao">
            <h4 id="labelEdit">ESTILO</h4>
            <label>Cores rápidas</label>
            <div class="color-palette">
                <div class="color-box" style="background:#000" onclick="setCor('#000')"></div>
                <div class="color-box" style="background:#fff" onclick="setCor('#fff')"></div>
                <div class="color-box" style="background:#c0392b" onclick="setCor('#c0392b')"></div>
                <div class="color-box" style="background:#f39c12" onclick="setCor('#f39c12')"></div>
                <div class="color-box" style="background:#2980b9" onclick="setCor('#2980b9')"></div>
                <div class="color-box" style="background:#27ae60" onclick="setCor('#27ae60')"></div>
                <div class="color-box" style="background:#8e44ad" onclick="setCor('#8e44ad')"></div>
                <div class="color-box" style="background:#e74c3c" onclick="setCor('#e74c3c')"></div>
            </div>

            <div class="campo"><label>Fonte</label>
                <select id="inFont" onchange="atualizarEstilo()">
                    <option value="'Bebas Neue'">Bebas Neue</option>
                    <option value="'Anton'">Anton</option>
                    <option value="'Archivo Black'">Archivo Black</option>
                    <option value="'Oswald'">Oswald</option>
                    <option value="Impact">Impact</option>
                </select>
            </div>
            <div class="campo"><label>Tamanho (px)</label><input type="range" id="inSize" min="8" max="400" step="1" oninput="atualizarEstilo()"></div>
            <div class="campo"><label>Cor</label><input type="color" id="inColor" onchange="atualizarEstilo()"></div>

            <div id="controlesDimensao" style="display:none; margin-top:1rem; padding-top:1rem; border-top:1px solid #ddd;">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="campo"><label>Largura (px)</label><input type="number" id="inW" min="10" oninput="atualizarEstilo()"></div>
                    <div class="campo"><label>Altura (px)</label><input type="number" id="inH" min="10" oninput="atualizarEstilo()"></div>
                </div>
            </div>
        </div>

        <button class="btn" onclick="centralizar()" style="background:var(--azul);color:white;width:100%;">↔ CENTRALIZAR</button>
        <button class="btn" onclick="adicionarTarja()" style="background:#e67e22;color:white;width:100%;margin-top:0.5rem;">⬛ TARJA PROMOCIONAL</button>
        <button class="btn" onclick="removerSelecionado()" style="background:var(--danger);color:white;width:100%;margin-top:0.5rem;">🗑 EXCLUIR ITEM</button>
        <button class="btn" onclick="removerCartaz()" style="background:none;border:2px solid var(--danger);color:var(--danger);width:100%;margin-top:1rem;">EXCLUIR CARTAZ INTEIRO</button>
    </div>
</div>

<script type="module">
    // ──────────────────────────────────────────────
    //  CONFIGURAÇÕES & ESTADO GLOBAL
    // ──────────────────────────────────────────────
    let cartazes = [];               // array de cartazes {id, itens: []}
    let currentSheet = 0;            // folha atual (para multi-folha no futuro)
    let sel = null;                  // {data, el, cartaz}
    let dragging = false;
    let resizing = false;
    let offset = {x:0, y:0};
    let history = [];
    let redoStack = [];
    let snapEnabled = true;
    let snapSize = 10;
    let debounceSave = null;

    const folha = document.getElementById('folha-impressao');

    // ──────────────────────────────────────────────
    //  FUNÇÕES DE HISTÓRICO (UNDO / REDO)
    // ──────────────────────────────────────────────
    function saveState() {
        history.push(JSON.stringify(cartazes));
        if (history.length > 50) history.shift();
        redoStack = [];
    }

    window.desfazer = () => {
        if (history.length === 0) return;
        redoStack.push(JSON.stringify(cartazes));
        cartazes = JSON.parse(history.pop());
        sel = null; fecharPainel();
        render();
    };

    window.refazer = () => {
        if (redoStack.length === 0) return;
        history.push(JSON.stringify(cartazes));
        cartazes = JSON.parse(redoStack.pop());
        sel = null; fecharPainel();
        render();
    };

    // ──────────────────────────────────────────────
    //  RENDERIZAÇÃO
    // ──────────────────────────────────────────────
    function render() {
        folha.innerHTML = '';
        cartazes.forEach(cartaz => {
            const area = document.createElement('div');
            area.className = 'cartaz-area';
            cartaz.itens.forEach(item => {
                const el = document.createElement('div');
                el.id = item.id;
                el.className = 'item-movel';
                el.style.left   = item.x + 'px';
                el.style.top    = item.y + 'px';
                el.style.color  = item.col || '#000';
                el.style.fontFamily = item.font || "'Bebas Neue'";
                el.style.fontSize   = (item.size || 40) + 'px';

                if (item.tipo === 'bg') {
                    el.classList.add('tarja-fundo');
                    el.style.backgroundColor = item.col;
                    el.style.width  = (item.w || 400) + 'px';
                    el.style.height = (item.h || 80) + 'px';
                } else if (item.tipo === 'img') {
                    el.style.width  = (item.w || 220) + 'px';
                    el.style.height = (item.h || 180) + 'px';
                    el.style.background = `url('${item.val}') center/contain no-repeat`;
                    el.style.border = '1px dashed #555';
                } else if (item.tipo === 'qr') {
                    el.innerHTML = `<div style="font-size:0.7em; margin-bottom:4px;">ESCANEIE</div><img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(item.val||'https://loja.com')}" style="width:100%;">`;
                    el.style.width = '140px';
                    el.style.height = 'auto';
                } else {
                    // texto normal ou preço
                    let txt = item.val || '';
                    if (item.tipo === 'preco') {
                        const [int, dec='00'] = txt.replace(',', '.').split('.');
                        txt = `<small style="font-size:0.4em">R$</small>${int}<small style="font-size:0.55em;border-bottom:5px solid currentColor">,${dec.padEnd(2,'0')}</small>`;
                    } else {
                        txt = txt.replace(/\n/g, '<br>');
                    }
                    el.innerHTML = txt;
                }

                // handle de resize
                if (['img','bg','qr'].includes(item.tipo)) {
                    const handle = document.createElement('div');
                    handle.className = 'resize-handle';
                    el.appendChild(handle);
                }

                // eventos
                el.onmousedown = e => startDrag(e, item, cartaz, el);
                if (el.querySelector('.resize-handle')) {
                    el.querySelector('.resize-handle').onmousedown = e => startResize(e, item, el);
                }

                el.ondblclick = () => {
                    if (item.tipo === 'img') adicionarImagem(item);
                    else if (item.tipo !== 'qr' && item.tipo !== 'bg') {
                        const novo = prompt("Editar texto:", item.val);
                        if (novo !== null) { item.val = novo.toUpperCase(); render(); saveState(); }
                    }
                };

                area.appendChild(el);
            });
            folha.appendChild(area);
        });
    }

    // ──────────────────────────────────────────────
    //  DRAG & RESIZE
    // ──────────────────────────────────────────────
    function startDrag(e, data, cartaz, el) {
        e.stopPropagation(); e.preventDefault();
        sel = {data, el, cartaz};
        dragging = true; resizing = false;
        offset.x = e.clientX - el.offsetLeft;
        offset.y = e.clientY - el.offsetTop;
        mostrarPainel(data, cartaz);
        el.classList.add('selecionado');
    }

    function startResize(e, data, el) {
        e.stopPropagation(); e.preventDefault();
        sel = {data, el, cartaz: sel?.cartaz};
        resizing = true; dragging = false;
        offset.x = e.clientX;
        offset.y = e.clientY;
    }

    function pararArrasto() {
        if (dragging || resizing) {
            if (snapEnabled) {
                const snap = parseInt(document.getElementById('snapSize').value);
                sel.data.x = Math.round(sel.data.x / snap) * snap;
                sel.data.y = Math.round(sel.data.y / snap) * snap;
                if (resizing) {
                    sel.data.w = Math.round(sel.data.w / snap) * snap;
                    sel.data.h = Math.round(sel.data.h / snap) * snap;
                }
            }
            saveState();
            agendarSalvar();
        }
        dragging = resizing = false;
    }

    document.onmousemove = e => {
        if (!sel) return;
        if (dragging) {
            let nx = e.clientX - offset.x;
            let ny = e.clientY - offset.y;
            const p = sel.el.parentElement;
            nx = Math.max(0, Math.min(p.clientWidth - sel.el.offsetWidth, nx));
            ny = Math.max(0, Math.min(p.clientHeight - sel.el.offsetHeight, ny));
            sel.data.x = nx; sel.data.y = ny;
            sel.el.style.left = nx + 'px';
            sel.el.style.top  = ny + 'px';
        } else if (resizing) {
            const dx = e.clientX - offset.x;
            const dy = e.clientY - offset.y;
            sel.data.w = Math.max(30, (sel.data.w || 200) + dx);
            sel.data.h = Math.max(30, (sel.data.h || 100) + dy);
            sel.el.style.width  = sel.data.w + 'px';
            sel.el.style.height = sel.data.h + 'px';
            offset.x = e.clientX; offset.y = e.clientY;
        }
    };

    document.addEventListener('keydown', e => {
        if (!sel) return;
        if (e.ctrlKey && e.key === 'z') { e.preventDefault(); desfazer(); }
        if (e.ctrlKey && e.key === 'y') { e.preventDefault(); refazer(); }
        if (e.key === 'Delete' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'INPUT') removerSelecionado();
        if (e.key === 'Escape') desmarcarTudo();
    });

    // ──────────────────────────────────────────────
    //  PAINEL DE EDIÇÃO
    // ──────────────────────────────────────────────
    function mostrarPainel(item, cartaz) {
        document.getElementById('edPanel').style.display = 'flex';
        document.getElementById('labelEdit').textContent = `EDITANDO: ${item.tipo.toUpperCase()}`;

        const isText = !['img','bg','qr'].includes(item.tipo);
        document.getElementById('secaoConteudo').style.display = isText ? 'block' : 'none';
        document.getElementById('controlesDimensao').style.display = ['img','bg','qr'].includes(item.tipo) ? 'block' : 'none';

        if (isText) {
            const campos = {head:'inHead', desc:'inDesc', marca:'inMarca', peso:'inPeso', preco:'inPreco'};
            for (let [tipo, id] of Object.entries(campos)) {
                const val = cartaz.itens.find(i => i.tipo === tipo)?.val || '';
                document.getElementById(id).value = val;
            }
            document.getElementById('inQR').value = cartaz.itens.find(i => i.tipo === 'qr')?.val || '';
        }

        document.getElementById('inFont').value  = item.font || "'Bebas Neue'";
        document.getElementById('inSize').value  = item.size || 40;
        document.getElementById('inColor').value = item.col || '#000000';
        document.getElementById('inW').value     = item.w || '';
        document.getElementById('inH').value     = item.h || '';
    }

    function fecharPainel() {
        document.getElementById('edPanel').style.display = 'none';
        document.querySelectorAll('.selecionado').forEach(el => el.classList.remove('selecionado'));
        sel = null;
    }

    window.desmarcarTudo = fecharPainel;

    function atualizar(tipo) {
        if (!sel) return;
        const alvo = sel.cartaz.itens.find(i => i.tipo === tipo);
        if (alvo) {
            alvo.val = document.getElementById('in' + tipo.charAt(0).toUpperCase() + tipo.slice(1)).value;
            render();
            agendarSalvar();
        }
    }

    function atualizarEstilo() {
        if (!sel) return;
        Object.assign(sel.data, {
            font: document.getElementById('inFont').value,
            size: parseInt(document.getElementById('inSize').value),
            col:  document.getElementById('inColor').value,
            w:    parseInt(document.getElementById('inW').value) || sel.data.w,
            h:    parseInt(document.getElementById('inH').value) || sel.data.h
        });
        render();
        agendarSalvar();
    }

    function setCor(cor) {
        document.getElementById('inColor').value = cor;
        atualizarEstilo();
    }

    window.centralizar = () => {
        if (!sel) return;
        const p = sel.el.parentElement;
        sel.data.x = (p.clientWidth - sel.el.offsetWidth) / 2;
        sel.el.style.left = sel.data.x + 'px';
        render(); agendarSalvar();
    };

    // ──────────────────────────────────────────────
    //  ADICIONAR ELEMENTOS
    // ──────────────────────────────────────────────
    window.adicionarCartaz = () => {
        saveState();
        const id = Date.now();
        const novo = {
            id,
            itens: [
                {id:'h-'+id, tipo:'head',  val:'OFERTA IMPERDÍVEL', x:60,  y:20,  size:48, col:'#c0392b'},
                {id:'d-'+id, tipo:'desc',  val:'PRODUTO TOP DE LINHA', x:50, y:90, size:70, col:'#000'},
                {id:'p-'+id, tipo:'preco', val:'9,99', x:40, y:180, size:180, col:'#000'},
            ]
        };
        cartazes.push(novo);
        render(); agendarSalvar();
    };

    window.adicionarTarja = () => {
        if (!sel) return alert("Selecione um cartaz primeiro.");
        saveState();
        const id = 'bg-'+Date.now();
        sel.cartaz.itens.unshift({
            id, tipo:'bg', val:'', x:0, y:100, size:0, col:'#e74c3c', w: sel.el.parentElement.clientWidth, h:120
        });
        render(); agendarSalvar();
    };

    window.adicionarImagem = (itemToReplace = null) => {
        if (!sel && !itemToReplace) return alert("Selecione um cartaz.");
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                saveState();
                const data = {id: 'img-'+Date.now(), tipo:'img', val:ev.target.result, x:50, y:50, w:220, h:180, col:'#000'};
                if (itemToReplace) {
                    Object.assign(itemToReplace, data);
                } else {
                    sel.cartaz.itens.push(data);
                }
                render(); agendarSalvar();
            };
            reader.readAsDataURL(file);
        };
        input.click();
    };

    window.adicionarQR = () => {
        if (!sel) return alert("Selecione um cartaz.");
        saveState();
        const id = 'qr-'+Date.now();
        sel.cartaz.itens.push({
            id, tipo:'qr', val: document.getElementById('inQR')?.value || 'https://sualoja.com.br/promocao',
            x: sel.el.parentElement.clientWidth - 160, y: sel.el.parentElement.clientHeight - 160
        });
        render(); agendarSalvar();
    };

    function atualizarQR() {
        if (sel && sel.data.tipo === 'qr') {
            sel.data.val = document.getElementById('inQR').value;
            render(); agendarSalvar();
        }
    }

    // ──────────────────────────────────────────────
    //  TEMPLATES
    // ──────────────────────────────────────────────
    window.carregarTemplate = val => {
        if (!val) return;
        saveState();
        const id = Date.now();
        let itens = [];

        if (val === 'oferta') {
            itens = [
                {tipo:'bg',   val:'', x:0, y:0, w:595, h:842, col:'#c0392b'},
                {tipo:'head', val:'QUEIMA TOTAL!', x:50, y:80, size:90, col:'#fff'},
                {tipo:'desc', val:'Tudo com até 70% OFF', x:50, y:220, size:60, col:'#fff'},
                {tipo:'preco',val:'A PARTIR DE 4,99', x:50, y:380, size:140, col:'#ff0'},
            ];
        } else if (val === 'kit') {
            itens = [
                {tipo:'head', val:'KIT ECONOMIA', x:60, y:30, size:65, col:'#27ae60'},
                {tipo:'desc', val:'Leve 3 pague 2', x:60, y:120, size:55, col:'#000'},
                {tipo:'preco',val:'29,90', x:60, y:220, size:180, col:'#c0392b'},
            ];
        } // adicione mais templates conforme necessário

        cartazes.push({id, itens});
        document.getElementById('selectTemplate').value = '';
        render(); agendarSalvar();
    };

    // ──────────────────────────────────────────────
    //  EXCLUSÃO
    // ──────────────────────────────────────────────
    window.removerSelecionado = () => {
        if (!sel) return;
        saveState();
        sel.cartaz.itens = sel.cartaz.itens.filter(i => i.id !== sel.data.id);
        fecharPainel();
        render(); agendarSalvar();
    };

    window.removerCartaz = () => {
        if (!sel || !confirm("Excluir este cartaz inteiro?")) return;
        saveState();
        cartazes = cartazes.filter(c => c.id !== sel.cartaz.id);
        fecharPainel();
        render(); agendarSalvar();
    };

    window.limparTudo = () => {
        if (!confirm("Limpar TODOS os cartazes?")) return;
        saveState();
        cartazes = []; sel = null;
        render(); agendarSalvar();
    };

    // ──────────────────────────────────────────────
    //  EXPORTAÇÃO PNG (alta resolução)
    // ──────────────────────────────────────────────
    window.exportarPNG = () => {
        html2canvas(folha, {scale: 3, useCORS: true}).then(canvas => {
            const link = document.createElement('a');
            link.download = 'cartazista-pro-21.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    };

    // ──────────────────────────────────────────────
    //  LAYOUT & AUTO-SAVE
    // ──────────────────────────────────────────────
    window.mudarLayout = v => {
        folha.className = v;
        render();
    };

    document.getElementById('snapCheck').onchange = e => snapEnabled = e.target.checked;
    document.getElementById('snapSize').onchange = e => snapSize = parseInt(e.target.value);

    function agendarSalvar() {
        clearTimeout(debounceSave);
        debounceSave = setTimeout(() => {
            // aqui pode salvar no Firebase se quiser manter
            console.log("Estado salvo automaticamente");
        }, 800);
    }

    // ──────────────────────────────────────────────
    //  INICIALIZAÇÃO
    // ──────────────────────────────────────────────
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('splash-screen').style.visibility = 'hidden', 1600);
        }, 2500);

        // carrega um cartaz inicial se vazio
        if (cartazes.length === 0) adicionarCartaz();
        render();
    };
</script>
</body>
</html>
