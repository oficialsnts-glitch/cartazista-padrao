<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GB Validade - Autônomo</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --cor-fundo: #f4f7fe; --cor-card: #ffffff; --primaria: #4361ee; --perigo: #ff4d4d; --sucesso: #2ecc71; --aviso: #ffa500; --texto: #2b2d42; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { margin: 0; background: var(--cor-fundo); color: var(--texto); padding-bottom: 100px; }
        
        /* Cabeçalho */
        .header { background: #1a1b2e; color: white; padding: 25px; text-align: center; border-bottom: 5px solid var(--primaria); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        
        .tela { display: none; }
        .ativa { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Estilo dos Itens na Lista */
        .card-item { background: var(--cor-card); border-radius: 20px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-left: 8px solid #ccc; position: relative; }
        .foto-produto { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; background: #eee; border: 1px solid #ddd; }
        .info-produto { flex: 1; }
        .info-produto b { font-size: 16px; display: block; margin-bottom: 4px; }
        .data-venc { font-weight: bold; font-size: 13px; }
        
        /* Formulário */
        .form-box { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #dee2e6; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primaria); }
        .btn-acao { width: 100%; padding: 18px; background: var(--primaria); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-acao:active { transform: scale(0.98); }

        /* Navegação Inferior */
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #edf2f7; z-index: 100; }
        .nav-btn { background: none; border: none; color: #a0aec0; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-btn.ativo { color: var(--primaria); }
        .nav-btn i { font-size: 24px; margin-bottom: 4px; }

        .btn-excluir { background: #fff5f5; color: var(--perigo); border: none; padding: 8px; border-radius: 10px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 22px; letter-spacing: 1px;">GB VALIDADES</h1>
    </div>

    <div class="container">
        <div id="tela-lista" class="tela ativa">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin:0; font-size: 18px;">Estoque Atual</h2>
                <button onclick="gerarPDF()" style="background:#edf2f7; border:none; padding:8px 12px; border-radius:10px; font-weight:bold; font-size:12px;">📄 PDF</button>
            </div>
            <div id="lista-render">Carregando itens...</div>
        </div>

        <div id="tela-cad" class="tela">
            <div class="form-box">
                <h2 style="margin-top:0; font-size: 18px;">Cadastrar Produto</h2>
                
                <img id="img-preview" style="width:100%; height:160px; object-fit:contain; display:none; border-radius:15px; margin-bottom:15px; background:#f8f9fa; border: 2px dashed #ddd;">
                
                <label style="display:block; background: #f8f9fa; border: 2px solid #edf2f7; padding:18px; border-radius:15px; text-align:center; margin-bottom:15px; font-weight:bold; color:var(--primaria); cursor:pointer;">
                    📸 TIRAR FOTO DO ITEM
                    <input type="file" id="input-foto" accept="image/*" capture="environment" style="display:none;" onchange="exibirPreview(this)">
                </label>

                <input type="text" id="nome-prod" placeholder="Nome do Produto">
                <input type="date" id="data-prod">
                <input type="number" id="qtd-prod" value="1" placeholder="Quantidade">
                
                <button onclick="salvarItem()" id="btn-save" class="btn-acao">SALVAR NO ESTOQUE</button>
                <button onclick="navegar('lista')" style="width:100%; background:none; color:#a0aec0; border:none; margin-top:15px; font-weight:bold;">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="nav-bottom">
        <button class="nav-btn ativo" onclick="navegar('lista')" id="nav-lista"><i>🏠</i>Início</button>
        <button class="nav-btn" onclick="navegar('cad')" id="nav-cad"><i>➕</i>Novo</button>
        <button class="nav-btn" onclick="location.reload()"><i>🔄</i>Atualizar</button>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE (SÓ O FIRESTORE É USADO)
        const firebaseConfig = {
            apiKey: "AIzaSyB1Z5EuMscjAGFcbIEvpPsDkp-hiIYh28o",
            authDomain: "meu-finan.firebaseapp.com",
            projectId: "meu-finan",
            storageBucket: "meu-finan.firebasestorage.app",
            messagingSenderId: "867200475066",
            appId: "1:867200475066:web:f90351b3d65a8a8df00783"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let dadosLocais = [];

        // FUNÇÃO DE BIP SONORO
        function somSucesso() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        // PREVIEW E COMPRESSÃO DE FOTO
        function exibirPreview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { 
                    const img = document.getElementById('img-preview');
                    img.src = e.target.result; 
                    img.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function encolherImagem(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const larguraAlvo = 400; 
                        const escala = larguraAlvo / img.width;
                        canvas.width = larguraAlvo;
                        canvas.height = img.height * escala;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    }
                }
            });
        }

        // SALVAR NO FIREBASE (ESTRATÉGIA BASE64 - INDEPENDENTE DO STORAGE)
        async function salvarItem() {
            const btn = document.getElementById('btn-save');
            const file = document.getElementById('input-foto').files[0];
            const item = {
                nome: document.getElementById('nome-prod').value,
                vencimento: document.getElementById('data-prod').value,
                quantidade: document.getElementById('qtd-prod').value,
                foto: "",
                criadoEm: new Date().getTime()
            };

            if(!item.nome || !item.vencimento) return alert("Por favor, preencha Nome e Validade.");

            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            if(file) item.foto = await encolherImagem(file);

            try {
                // Coleção independente "sistema_validade_isolado"
                await db.collection("sistema_validade_isolado").add(item);
                somSucesso();
                navegar('lista');
                carregarEstoque();
                // Limpar campos
                document.getElementById('nome-prod').value = "";
                document.getElementById('data-prod').value = "";
                document.getElementById('img-preview').style.display = "none";
                btn.disabled = false;
                btn.innerText = "SALVAR NO ESTOQUE";
            } catch(e) { 
                alert("Erro ao conectar com o banco de dados."); 
                btn.disabled = false; 
            }
        }

        // CARREGAR DADOS
        async function carregarEstoque() {
            const snapshot = await db.collection("sistema_validade_isolado").orderBy("vencimento", "asc").get();
            let html = "";
            dadosLocais = [];
            
            snapshot.forEach(doc => {
                const p = doc.data();
                dadosLocais.push(p);
                const hoje = new Date();
                const venc = new Date(p.vencimento + "T12:00:00");
                const diasRestantes = Math.ceil((venc - hoje) / (1000 * 60 * 60 * 24));
                
                let corStatus = "var(--sucesso)";
                if(diasRestantes < 0) corStatus = "var(--perigo)";
                else if(diasRestantes <= 10) corStatus = "var(--aviso)";
                
                html += `
                <div class="card-item" style="border-left-color: ${corStatus}">
                    <img src="${p.foto || 'https://via.placeholder.com/80?text=Sem+Foto'}" class="foto-produto">
                    <div class="info-produto">
                        <b>${p.nome}</b>
                        <small>Qtd: ${p.quantidade}</small><br>
                        <span class="data-venc" style="color:${corStatus}">
                            ${diasRestantes < 0 ? 'VENCIDO' : 'Vence em'}: ${p.vencimento.split('-').reverse().join('/')}
                        </span>
                    </div>
                    <button class="btn-excluir" onclick="removerItem('${doc.id}')">🗑️</button>
                </div>`;
            });
            document.getElementById('lista-render').innerHTML = html || "<p style='text-align:center; opacity:0.5; margin-top:50px;'>O estoque está vazio.</p>";
        }

        async function removerItem(id) {
            if(confirm("Tem certeza que deseja remover este item?")) {
                await db.collection("sistema_validade_isolado").doc(id).delete();
                carregarEstoque();
            }
        }

        // NAVEGAÇÃO ENTRE TELAS
        function navegar(tela) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('ativo'));
            
            document.getElementById('tela-' + tela).classList.add('ativa');
            document.getElementById('nav-' + tela).classList.add('ativo');
        }

        // EXPORTAR PDF
        function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("helvetica", "bold");
            doc.text("CONTROLE DE ESTOQUE - VALIDADES", 20, 20);
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            
            let linha = 35;
            dadosLocais.forEach(p => {
                doc.text(`${p.vencimento.split('-').reverse().join('/')} | Qtd: ${p.quantidade} | ${p.nome}`, 20, linha);
                linha += 10;
            });
            doc.save("relatorio-validade.pdf");
        }

        // Iniciar carregamento
        carregarEstoque();
    </script>
</body>
</html>
