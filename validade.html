<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Validades - GB</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        :root { --primary: #4361ee; --success: #2ecc71; --warning: #ffa500; --danger: #ff4d4d; }
        body { margin: 0; background: #f0f2f8; font-family: -apple-system, sans-serif; padding-bottom: 80px; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .tela { display: none; }
        .ativa { display: block; }
        .card { background: white; border-radius: 18px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border-left: 6px solid #ccc; }
        .thumb { width: 65px; height: 65px; border-radius: 12px; object-fit: cover; background: #eee; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; }
        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; }
        .fab { position: fixed; bottom: 85px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <nav>
        <b onclick="location.href='index.html'"><i>🏠</i>Home</b>
        <b onclick="irPara('home')"><i>📋</i>Lista</b>
    </nav>

    <button class="fab" onclick="irPara('cad')">+</button>

    <div class="container">
        <div id="t-home" class="tela ativa">
            <h2>Minhas Validades</h2>
            <div id="l-home">Carregando produtos...</div>
        </div>

        <div id="t-cad" class="tela">
            <div style="background: white; padding: 20px; border-radius: 25px;">
                <h3>Novo Produto</h3>
                <img id="p-img" style="width:100%; height:180px; object-fit:contain; display:none; border-radius:15px; margin-bottom:15px; background:#000;">
                <label style="display:block; background:#eee; padding:15px; border-radius:12px; text-align:center; margin-bottom:15px; font-weight:bold;">
                    📷 TIRAR FOTO
                    <input type="file" id="f-in" accept="image/*" capture="environment" style="display:none;" onchange="pFoto(this)">
                </label>
                <input type="text" id="p-nome" placeholder="Nome do Produto">
                <input type="date" id="p-data">
                <input type="number" id="p-qtd" value="1">
                <button onclick="salvar()" id="b-salvar" style="width:100%; padding:18px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold;">SALVAR PRODUTO</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB1Z5EuMscjAGFcbIEvpPsDkp-hiIYh28o",
            authDomain: "meu-finan.firebaseapp.com",
            projectId: "meu-finan",
            storageBucket: "meu-finan.firebasestorage.app",
            messagingSenderId: "867200475066",
            appId: "1:867200475066:web:f90351b3d65a8a8df00783"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const auth = firebase.auth();
        let prods = [];

        auth.onAuthStateChanged(u => { if(u) load(); else location.href='index.html'; });

        function pFoto(i) {
            if (i.files && i.files[0]) {
                const r = new FileReader(); r.onload = e => { 
                    document.getElementById('p-img').src = e.target.result; 
                    document.getElementById('p-img').style.display='block';
                }; r.readAsDataURL(i.files[0]);
            }
        }

        async function processarBase64(file) {
            return new Promise((res) => {
                const r = new FileReader(); r.readAsDataURL(file);
                r.onload = (e) => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const cv = document.createElement('canvas');
                        const w = 400; const sc = w / img.width;
                        cv.width = w; cv.height = img.height * sc;
                        const ctx = cv.getContext('2d');
                        ctx.drawImage(img, 0, 0, cv.width, cv.height);
                        res(cv.toDataURL('image/jpeg', 0.6));
                    }
                }
            });
        }

        async function salvar() {
            const btn = document.getElementById('b-salvar');
            const file = document.getElementById('f-in').files[0];
            const d = {
                nome: document.getElementById('p-nome').value,
                validade: document.getElementById('p-data').value,
                qtd: parseInt(document.getElementById('p-qtd').value),
                user: auth.currentUser.email,
                foto: ""
            };
            if(!d.nome || !d.validade) return alert("Preencha os campos!");
            btn.disabled = true; btn.innerText = "SALVANDO...";
            if(file) d.foto = await processarBase64(file);
            await db.collection("prods_v").add(d);
            location.reload();
        }

        async function load() {
            const s = await db.collection("prods_v").where("user", "==", auth.currentUser.email).orderBy("validade").get();
            let h = ""; s.forEach(doc => {
                const p = doc.data();
                const diff = Math.ceil((new Date(p.validade+"T12:00:00") - new Date()) / 86400000);
                let c = diff < 0 ? "var(--danger)" : (diff <= 7 ? "var(--warning)" : "var(--success)");
                h += `<div class="card" style="border-left-color:${c}">
                    <img src="${p.foto || ''}" class="thumb">
                    <div><b>${p.nome}</b><br><small>Qtd: ${p.qtd}</small><br><span style="color:${c}">Vence: ${p.validade.split('-').reverse().join('/')}</span></div>
                </div>`;
            });
            document.getElementById('l-home').innerHTML = h || "Nenhum produto.";
        }

        function irPara(t) { document.querySelectorAll('.tela').forEach(e => e.classList.remove('ativa')); document.getElementById('t-'+t).classList.add('ativa'); }
    </script>
</body>
</html>
