<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GB Validade PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --primary: #007AFF; /* Azul iOS */
            --danger: #FF3B30;
            --success: #34C759;
            --warning: #FF9500;
            --text-main: #1C1C1E;
            --text-sub: #8E8E93;
            --radius: 16px;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body { 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text-main);
            line-height: 1.4;
        }

        /* HEADER ESTILO NATIVO */
        .header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            text-align: center;
            z-index: 100;
            border-bottom: 0.5px solid #D1D1D6;
        }

        .header h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }

        .container { 
            padding: 16px; 
            max-width: 500px; 
            margin: 0 auto; 
            min-height: calc(100vh - 150px);
        }

        .tela { display: none; }
        .ativa { display: block; animation: fadeIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS ESTILO APP */
        .card-item {
            background: var(--card);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: transform 0.2s;
        }

        .card-item:active { transform: scale(0.98); }

        .foto-produto {
            width: 72px;
            height: 72px;
            border-radius: 12px;
            object-fit: cover;
            background: #F2F2F7;
        }

        .info-produto { flex: 1; }
        .info-produto b { font-size: 16px; color: var(--text-main); display: block; margin-bottom: 2px; }
        .info-produto small { font-size: 13px; color: var(--text-sub); }
        .data-venc { font-size: 13px; font-weight: 600; margin-top: 4px; display: block; }

        /* BOTÕES E INPUTS */
        .form-box { background: var(--card); border-radius: 20px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid #E5E5EA;
            background: #F9F9FB;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--primary); background: #fff; outline: none; }

        .btn-acao {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            margin-top: 10px;
        }

        /* FAB (Botão flutuante) */
        .fab {
            position: fixed;
            bottom: 100px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 30px;
            box-shadow: 0 8px 16px rgba(0,122,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        /* TAB BAR (Navegação inferior) */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 85px;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            border-top: 0.5px solid #D1D1D6;
            z-index: 1000;
        }

        .tab-item {
            border: none;
            background: none;
            color: var(--text-sub);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            font-weight: 500;
        }

        .tab-item.ativo { color: var(--primary); }
        .tab-item i { font-size: 24px; margin-bottom: 4px; }

        .badge-status {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }
        
        .btn-del {
            background: #FFF0F0;
            color: var(--danger);
            border: none;
            padding: 10px;
            border-radius: 12px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Validade Pro</h1>
    </div>

    <div class="container">
        <div id="tela-lista" class="tela ativa">
            <div style="display:flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
                <h2 style="margin:0; font-size: 24px; letter-spacing: -1px;">Estoque</h2>
                <button onclick="gerarPDF()" style="background:none; border:none; color:var(--primary); font-weight: 600;">Relatório</button>
            </div>
            <div id="lista-render">Carregando itens...</div>
        </div>

        <div id="tela-cad" class="tela">
            <div class="form-box">
                <h2 style="margin-top:0; font-size: 22px; letter-spacing: -0.5px;">Adicionar Item</h2>
                
                <div id="area-foto" style="position:relative; margin-bottom:20px;">
                    <img id="img-preview" style="width:100%; height:200px; object-fit:cover; display:none; border-radius:14px; background:#000;">
                    <label style="display:flex; flex-direction:column; align-items:center; justify-content:center; background:#F2F2F7; height:200px; border-radius:14px; border: 2px dashed #C7C7CC; cursor:pointer;">
                        <span style="font-size:40px;">📸</span>
                        <span style="font-weight:600; color:var(--primary); margin-top:10px;">Tirar Foto</span>
                        <input type="file" id="input-foto" accept="image/*" capture="environment" style="display:none;" onchange="exibirPreview(this)">
                    </label>
                </div>

                <label style="font-size:13px; font-weight:600; color:var(--text-sub); margin-left:4px;">NOME DO PRODUTO</label>
                <input type="text" id="nome-prod" placeholder="Ex: Iogurte Natural">
                
                <label style="font-size:13px; font-weight:600; color:var(--text-sub); margin-left:4px;">DATA DE VENCIMENTO</label>
                <input type="date" id="data-prod">
                
                <label style="font-size:13px; font-weight:600; color:var(--text-sub); margin-left:4px;">QUANTIDADE</label>
                <input type="number" id="qtd-prod" value="1">
                
                <button onclick="salvarItem()" id="btn-save" class="btn-acao">Salvar Produto</button>
            </div>
        </div>
    </div>

    <button class="fab" onclick="navegar('cad')">＋</button>

    <div class="tab-bar">
        <button class="tab-item ativo" onclick="navegar('lista')" id="nav-lista">
            <i>🏠</i><span>Início</span>
        </button>
        <button class="tab-item" onclick="location.reload()">
            <i>🔄</i><span>Atualizar</span>
        </button>
        <button class="tab-item" onclick="location.href='index.html'">
            <i>📱</i><span>Painel</span>
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB1Z5EuMscjAGFcbIEvpPsDkp-hiIYh28o",
            authDomain: "meu-finan.firebaseapp.com",
            projectId: "meu-finan",
            storageBucket: "meu-finan.firebasestorage.app",
            messagingSenderId: "867200475066",
            appId: "1:867200475066:web:f90351b3d65a8a8df00783"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let dadosLocais = [];

        function somSucesso() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.3);
        }

        function exibirPreview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { 
                    const img = document.getElementById('img-preview');
                    img.src = e.target.result; 
                    img.style.display = 'block';
                    document.querySelector('#area-foto label').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function encolherImagem(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const largura = 400; 
                        const escala = largura / img.width;
                        canvas.width = largura;
                        canvas.height = img.height * escala;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    }
                }
            });
        }

        async function salvarItem() {
            const btn = document.getElementById('btn-save');
            const file = document.getElementById('input-foto').files[0];
            const item = {
                nome: document.getElementById('nome-prod').value,
                vencimento: document.getElementById('data-prod').value,
                quantidade: document.getElementById('qtd-prod').value,
                foto: "",
                criadoEm: new Date().getTime()
            };

            if(!item.nome || !item.vencimento) return alert("Preencha Nome e Data!");

            btn.disabled = true;
            btn.innerText = "Salvando...";

            if(file) item.foto = await encolherImagem(file);

            try {
                await db.collection("sistema_validade_isolado").add(item);
                somSucesso();
                location.reload();
            } catch(e) { alert("Erro ao salvar"); btn.disabled = false; }
        }

        async function carregarEstoque() {
            const snapshot = await db.collection("sistema_validade_isolado").orderBy("vencimento", "asc").get();
            let html = "";
            dadosLocais = [];
            
            snapshot.forEach(doc => {
                const p = doc.data();
                dadosLocais.push(p);
                const hoje = new Date();
                const venc = new Date(p.vencimento + "T12:00:00");
                const dias = Math.ceil((venc - hoje) / (1000 * 60 * 60 * 24));
                
                let cor = "var(--success)";
                let statusTxt = "No prazo";
                if(dias < 0) { cor = "var(--danger)"; statusTxt = "Vencido"; }
                else if(dias <= 10) { cor = "var(--warning)"; statusTxt = "Vence logo"; }
                
                html += `
                <div class="card-item">
                    <img src="${p.foto || 'https://via.placeholder.com/80?text=GB'}" class="foto-produto">
                    <div class="info-produto">
                        <b>${p.nome}</b>
                        <small>Qtd: ${p.quantidade} unidades</small>
                        <span class="data-venc" style="color:${cor}">
                           ${statusTxt}: ${p.vencimento.split('-').reverse().join('/')}
                        </span>
                    </div>
                    <button class="btn-del" onclick="removerItem('${doc.id}')">✕</button>
                </div>`;
            });
            document.getElementById('lista-render').innerHTML = html || "<p style='text-align:center; opacity:0.3; margin-top:80px;'>Vazio</p>";
        }

        async function removerItem(id) {
            if(confirm("Remover item?")) {
                await db.collection("sistema_validade_isolado").doc(id).delete();
                carregarEstoque();
            }
        }

        function navegar(tela) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('ativo'));
            document.getElementById('tela-' + tela).classList.add('ativa');
            if(tela === 'lista') document.getElementById('nav-lista').classList.add('ativo');
        }

        function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(20);
            doc.text("RELATÓRIO DE ESTOQUE", 20, 20);
            let y = 35;
            dadosLocais.forEach(p => {
                doc.setFontSize(10);
                doc.text(`${p.vencimento.split('-').reverse().join('/')} - ${p.nome} (${p.quantidade} un)`, 20, y);
                y += 8;
            });
            doc.save("validade.pdf");
        }

        carregarEstoque();
    </script>
</body>
</html>
